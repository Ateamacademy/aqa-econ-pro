<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" font-family="Arial, sans-serif">
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .ar { stroke:#1976d2; stroke-width:2.5; fill:none; }
    .mr { stroke:#7b1fa2; stroke-width:2.5; fill:none; }
    .mc { stroke:#2e7d32; stroke-width:2.5; fill:none; }
    .atc { stroke:#212121; stroke-width:2.5; fill:none; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .profit { fill:#ef5350; opacity:0.5; stroke:#b71c1c; stroke-width:1; }
    .lbl   { font-size:13px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pt    { fill:#111; }
  </style>

  <text x="350" y="28" text-anchor="middle" class="ttl">Monopoly — Profit Maximisation (MC = MR)</text>
  <text x="350" y="48" text-anchor="middle" class="sub">UK regional water provider chooses output where MC = MR; price set off AR; supernormal profit when AR &gt; ATC</text>

  <line class="axis" x1="90"  y1="80"  x2="90"  y2="450"/>
  <line class="axis" x1="90"  y1="450" x2="640" y2="450"/>
  <text x="35"  y="80"  class="lblB">Price /</text>
  <text x="35"  y="98"  class="lblB">Cost /</text>
  <text x="35"  y="116" class="lblB">Revenue (£)</text>
  <text x="540" y="475" class="lblB">Quantity (Q)</text>

  <!-- Supernormal profit rectangle: x[90, 256], y[214, 290] -->
  <rect class="profit" x="90" y="214" width="166" height="76"/>

  <!-- AR: linear downward (130, 130) to (600, 443). slope=0.667 -->
  <line class="ar" x1="130" y1="130" x2="600" y2="443"/>
  <text x="605" y="443" class="lbl" fill="#1976d2">AR = D</text>

  <!-- MR: same y-intercept (~103 at x=90), double slope. From (130, 157) to (350, 450) -->
  <line class="mr" x1="130" y1="157" x2="350" y2="450"/>
  <text x="358" y="450" class="lbl" fill="#7b1fa2">MR</text>

  <!-- ATC: clean U-shape with minimum near (380, 280). 
       Use cubic Bezier: from (130, 200) down to (380, 280), then up to (570, 220) -->
  <path class="atc" d="M 130 200 C 220 360 320 320 380 290 C 460 250 530 230 570 200"/>
  <text x="575" y="200" class="lbl" fill="#212121">ATC</text>

  <!-- MC: U-shape that intersects ATC at its minimum (around x=380, y=290).
       Start low-ish at left, dip then rise sharply, crossing ATC at min -->
  <path class="mc" d="M 130 360 C 180 410 240 410 290 370 C 340 330 380 300 380 290 C 400 270 480 200 540 130"/>
  <text x="545" y="130" class="lbl" fill="#2e7d32">MC</text>

  <!-- MC ∩ MR at approx Q_PM. MR equation: from (130,157) to (350,450). slope=(450-157)/(350-130)=1.331; y = 1.331x - 16.0
       MC at small Q is below. Need to find where MC curve hits MR. From visual inspection: around x=265, y=337
       (MR at x=265: 1.331*265-16 = 336.7) -->
  <circle class="pt" cx="265" cy="337" r="4.5"/>
  <line class="dotted" x1="265" y1="337" x2="265" y2="450"/>
  <text x="256" y="468" class="lblB">Q_PM</text>

  <!-- Project up to AR at x=265: AR y = 0.667*265 + 43.3 = 220 -->
  <line class="dotted" x1="265" y1="337" x2="265" y2="220"/>
  <circle class="pt" cx="265" cy="220" r="4.5"/>
  <line class="dotted" x1="265" y1="220" x2="90"  y2="220"/>
  <text x="50"  y="225" class="lblB">P_PM</text>

  <!-- AC at Q_PM=265: read from ATC curve - approx y=312 -->
  <circle class="pt" cx="265" cy="312" r="4.5"/>
  <line class="dotted" x1="265" y1="312" x2="90"  y2="312"/>
  <text x="50"  y="317" class="lblB">AC</text>

  <!-- Profit rectangle update -->
  <rect class="profit" x="90" y="220" width="175" height="92"/>
  <text x="115" y="260" class="lblB" fill="#b71c1c">Supernormal profit</text>
  <text x="115" y="278" class="lbl"  fill="#b71c1c">= (P_PM − AC) × Q_PM</text>

  <text x="90"  y="495" class="sub">Step 1: find where MC = MR. Step 2: project up to the AR (demand) curve to set the profit-maximising price P_PM.</text>
  <text x="90"  y="512" class="sub">Step 3: compare P_PM to AC at that quantity. Here AR &gt; ATC, so the firm earns supernormal profit (shaded red).</text>
  <text x="90"  y="529" class="sub">High barriers to entry mean these profits are not competed away in the long run.</text>
</svg>
