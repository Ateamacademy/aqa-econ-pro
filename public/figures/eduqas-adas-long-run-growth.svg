<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="Arial, sans-serif">
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .ppf1 { stroke:#1976d2; stroke-width:2.8; fill:none; }
    .ppf2 { stroke:#0d47a1; stroke-width:2.8; fill:none; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .arrow { stroke:#0d47a1; stroke-width:2.2; fill:none; marker-end:url(#a); }
    .lbl   { font-size:14px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pt    { fill:#111; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d47a1"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" class="ttl">Welsh Economy — Long-Run Growth via R&amp;D and Skills</text>
  <text x="350" y="50" text-anchor="middle" class="sub">Investment in capital and human capital shifts the PPF outward (PPF1 → PPF2)</text>

  <line class="axis" x1="100" y1="80"  x2="100" y2="450"/>
  <line class="axis" x1="100" y1="450" x2="640" y2="450"/>
  <text x="40"  y="80"  class="lblB">Capital</text>
  <text x="40"  y="98"  class="lblB">Goods</text>
  <text x="525" y="475" class="lblB">Consumer Goods</text>

  <!-- PPF1: quarter-ellipse from (100,150) to (450,450) -->
  <path class="ppf1" d="M 100 150 A 350 300 0 0 1 450 450"/>
  <text x="455" y="448" class="lbl" fill="#1976d2">PPF1</text>

  <!-- PPF2 (outward): from (100,100) to (570,450) -->
  <path class="ppf2" d="M 100 100 A 470 350 0 0 1 570 450"/>
  <text x="575" y="448" class="lbl" fill="#0d47a1">PPF2</text>

  <!-- Production point A on PPF1 -->
  <circle class="pt" cx="280" cy="220" r="4.5"/>
  <text x="290" y="218" class="lbl">A</text>
  <line class="dotted" x1="280" y1="220" x2="280" y2="450"/>
  <line class="dotted" x1="280" y1="220" x2="100" y2="220"/>

  <!-- Production point B on PPF2 -->
  <circle class="pt" cx="365" cy="170" r="4.5"/>
  <text x="375" y="168" class="lbl">B</text>
  <line class="dotted" x1="365" y1="170" x2="365" y2="450"/>
  <line class="dotted" x1="365" y1="170" x2="100" y2="170"/>

  <!-- Outward shift arrows -->
  <path class="arrow" d="M 320 290 L 400 240"/>
  <path class="arrow" d="M 200 350 L 240 320"/>
  <text x="335" y="285" class="lbl" fill="#0d47a1">PPF shifts outward</text>

  <!-- Caption -->
  <text x="100" y="495" class="sub">More/better capital goods + higher labour productivity raise the maximum sustainable output of both goods.</text>
  <text x="100" y="512" class="sub">The economy can now produce combinations previously unattainable — long-run economic growth.</text>
</svg>
