<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="700" height="500" fill="#fff"/>
  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Supply-Side Shock: Nigeria Fuel Price Surge</text>
  <!-- Axes -->
  <line x1="80" y1="60" x2="80" y2="440" stroke="#1e293b" stroke-width="2.5"/>
  <line x1="80" y1="440" x2="650" y2="440" stroke="#1e293b" stroke-width="2.5"/>
  <text x="35" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b" transform="rotate(-90,35,250)">Price Level</text>
  <text x="380" y="485" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Real GDP (Y)</text>
  <!-- AD -->
  <line x1="140" y1="90" x2="600" y2="420" stroke="#ef4444" stroke-width="3"/>
  <text x="605" y="430" font-size="15" font-weight="700" fill="#ef4444">AD</text>
  <!-- SRAS1 -->
  <line x1="120" y1="410" x2="600" y2="80" stroke="#3b82f6" stroke-width="3"/>
  <text x="610" y="75" font-size="15" font-weight="700" fill="#3b82f6">SRAS₁</text>
  <!-- SRAS2 shifted left -->
  <line x1="100" y1="320" x2="470" y2="70" stroke="#22c55e" stroke-width="3"/>
  <text x="440" y="60" font-size="15" font-weight="700" fill="#22c55e">SRAS₂</text>
  <!-- E1 at approx (360, 240) -->
  <circle cx="360" cy="240" r="5" fill="#1e293b" stroke="#fff" stroke-width="1.5"/>
  <line x1="80" y1="240" x2="360" y2="240" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <line x1="360" y1="240" x2="360" y2="440" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <text x="60" y="245" text-anchor="end" font-size="14" fill="#1e293b">P₁</text>
  <text x="360" y="458" text-anchor="middle" font-size="14" fill="#1e293b">Y₁</text>
  <!-- E2 at approx (270, 175) -->
  <circle cx="270" cy="175" r="5" fill="#1e293b" stroke="#fff" stroke-width="1.5"/>
  <line x1="80" y1="175" x2="270" y2="175" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <line x1="270" y1="175" x2="270" y2="440" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <text x="60" y="180" text-anchor="end" font-size="14" fill="#1e293b">P₂</text>
  <text x="270" y="458" text-anchor="middle" font-size="14" fill="#1e293b">Y₂</text>
  <!-- Shift arrow -->
  <defs><marker id="arrSRASL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/></marker></defs>
  <path d="M 390 280 Q 340 260 290 245" stroke="#22c55e" stroke-width="2.5" fill="none" marker-end="url(#arrSRASL)"/>
  <text x="160" y="130" font-size="13" fill="#22c55e" font-weight="600">SRAS shifts left</text>
  <text x="160" y="148" font-size="12" fill="#22c55e">(↑ energy costs)</text>
</svg>