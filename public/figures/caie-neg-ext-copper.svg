<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" font-family="Arial, sans-serif">
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .curve { stroke-width:2.5; fill:none; }
    .mpc { stroke:#c62828; }
    .msc { stroke:#7f0000; stroke-dasharray:2,2; }
    .pmb { stroke:#1976d2; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .dwl   { fill:#ef5350; opacity:0.55; stroke:#b71c1c; stroke-width:1; }
    .lbl   { font-size:14px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pt    { fill:#111; }
  </style>

  <text x="350" y="28" text-anchor="middle" class="ttl">Negative Externality of Production — Zambian Copper Mining</text>
  <text x="350" y="48" text-anchor="middle" class="sub">Pollution costs ignored by the firm: MSC sits above MPC → market over-produces copper</text>

  <line class="axis" x1="90"  y1="80"  x2="90"  y2="450"/>
  <line class="axis" x1="90"  y1="450" x2="640" y2="450"/>
  <text x="40"  y="80"  class="lblB">Price /</text>
  <text x="40"  y="98"  class="lblB">Cost</text>
  <text x="555" y="475" class="lblB">Quantity of Copper</text>

  <!-- Welfare loss triangle: vertices at E* (315, 259), MSC at Q1 (363, 224), and E1 (363, 282) -->
  <polygon class="dwl" points="315,259 363,224 363,282"/>

  <!-- MPC = S (private supply, upward sloping). y = -0.744x + 526.7; from (130,430) to (560,110) -->
  <line class="curve mpc" x1="130" y1="430" x2="560" y2="110"/>
  <text x="565" y="110" class="lbl" fill="#c62828">MPC = S</text>

  <!-- MSC (above MPC, parallel up by 60). y = -0.744x + 466.7; from (90, 399) to (450, 130) -->
  <line class="curve msc" x1="90" y1="399" x2="450" y2="130"/>
  <text x="430" y="120" class="lbl" fill="#7f0000">MSC</text>

  <!-- D = MPB = MSB (consumption has no externality here). y = 0.625x + 35; from (120,110) to (560,385) -->
  <line class="curve pmb" x1="120" y1="110" x2="560" y2="385"/>
  <text x="565" y="385" class="lbl" fill="#1976d2">D = MPB = MSB</text>

  <!-- Free market E1 = MPB ∩ MPC: x≈363, y≈282 (where copper firm chooses) -->
  <circle class="pt" cx="363" cy="282" r="4.5"/>
  <line class="dotted" x1="363" y1="282" x2="363" y2="450"/>
  <line class="dotted" x1="363" y1="282" x2="90"  y2="282"/>
  <text x="60"  y="287" class="lblB">P1</text>
  <text x="357" y="468" class="lblB">Q1</text>
  <text x="370" y="278" class="lbl">E1</text>

  <!-- Social optimum E* = MPB ∩ MSC: 0.625x+35 = -0.744x+466.7 → 1.369x = 431.7 → x=315.4, y=232.1 -->
  <circle class="pt" cx="315" cy="232" r="4.5"/>
  <line class="dotted" x1="315" y1="232" x2="315" y2="450"/>
  <line class="dotted" x1="315" y1="232" x2="90"  y2="232"/>
  <text x="60"  y="237" class="lblB">P*</text>
  <text x="306" y="468" class="lblB">Q*</text>
  <text x="285" y="229" class="lbl">E*</text>

  <line class="dotted" x1="345" y1="250" x2="450" y2="200" stroke="#b71c1c"/>
  <text x="455" y="205" class="lbl" fill="#b71c1c">Welfare loss (DWL)</text>

  <text x="90"  y="495" class="sub">Mining firms set MPB = MPC at Q1; the social optimum is at MPB = MSC at Q* &lt; Q1 → overproduction.</text>
  <text x="90"  y="512" class="sub">Between Q* and Q1, MSC &gt; MSB: each extra tonne costs society more (pollution, health) than it benefits.</text>
  <text x="90"  y="529" class="sub">Policy: a per-tonne pollution tax (Pigouvian tax) of size MSC−MPC internalises the externality and moves output to Q*.</text>
</svg>
