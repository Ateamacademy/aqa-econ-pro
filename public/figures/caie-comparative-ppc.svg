<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 490" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="490" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Comparative Advantage — PPFs for Vietnam &amp; Brazil</text>

  <line x1="90" y1="400" x2="570" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="515" y="420" font-size="12" font-weight="600" fill="#0f172a">Coffee (bags)</text>
  <text x="55" y="60" font-size="12" font-weight="600" fill="#0f172a">Computers</text>
  <text x="55" y="75" font-size="12" font-weight="600" fill="#0f172a">(units)</text>

  <!-- Coffee x-axis: 0-100 bags. Scale: 100 bags = 400 pixels (from x=90 to x=490). So 1 bag = 4 px, 80 bags = 320 px, 100 bags = 400 px -->
  <!-- Computers y-axis: 0-40 units. Scale: 40 = 320 pixels (from y=400 to y=80). So 1 unit = 8 px -->

  <!-- Ticks x -->
  <g font-size="10" fill="#475569">
    <line x1="170" y1="400" x2="170" y2="405" stroke="#0f172a"/>
    <text x="170" y="418" text-anchor="middle">20</text>
    <line x1="250" y1="400" x2="250" y2="405" stroke="#0f172a"/>
    <text x="250" y="418" text-anchor="middle">40</text>
    <line x1="330" y1="400" x2="330" y2="405" stroke="#0f172a"/>
    <text x="330" y="418" text-anchor="middle">60</text>
    <line x1="410" y1="400" x2="410" y2="405" stroke="#0f172a"/>
    <text x="410" y="418" text-anchor="middle" font-weight="700" fill="#be123c">80</text>
    <line x1="490" y1="400" x2="490" y2="405" stroke="#0f172a"/>
    <text x="490" y="418" text-anchor="middle" font-weight="700" fill="#0284c7">100</text>
  </g>

  <!-- Ticks y -->
  <g font-size="10" fill="#475569">
    <line x1="85" y1="320" x2="90" y2="320" stroke="#0f172a"/>
    <text x="82" y="324" text-anchor="end">10</text>
    <line x1="85" y1="240" x2="90" y2="240" stroke="#0f172a"/>
    <text x="82" y="244" text-anchor="end" font-weight="700" fill="#0284c7">20</text>
    <line x1="85" y1="160" x2="90" y2="160" stroke="#0f172a"/>
    <text x="82" y="164" text-anchor="end">30</text>
    <line x1="85" y1="80" x2="90" y2="80" stroke="#0f172a"/>
    <text x="82" y="84" text-anchor="end" font-weight="700" fill="#be123c">40</text>
  </g>

  <!-- Vietnam PPF: from (0, 20 computers)=(90,240) to (100 coffee, 0)=(490,400) -->
  <line x1="90" y1="240" x2="490" y2="400" stroke="#0284c7" stroke-width="2.8"/>
  <text x="350" y="345" font-size="12" font-weight="700" fill="#0284c7">Vietnam PPF</text>
  <circle cx="90" cy="240" r="4" fill="#0284c7"/>
  <circle cx="490" cy="400" r="4" fill="#0284c7"/>

  <!-- Brazil PPF: from (0, 40 computers)=(90,80) to (80 coffee, 0)=(410,400) -->
  <line x1="90" y1="80" x2="410" y2="400" stroke="#be123c" stroke-width="2.8"/>
  <text x="210" y="175" font-size="12" font-weight="700" fill="#be123c">Brazil PPF</text>
  <circle cx="90" cy="80" r="4" fill="#be123c"/>
  <circle cx="410" cy="400" r="4" fill="#be123c"/>

  <!-- Opportunity cost annotation box -->
  <rect x="310" y="80" width="280" height="130" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Opportunity cost of 1 Computer</text>
  <text x="325" y="118" font-size="11" fill="#0284c7" font-weight="700">Vietnam:</text>
  <text x="395" y="118" font-size="11" fill="#0f172a">100/20 = <tspan font-weight="700">5 bags</tspan></text>
  <text x="325" y="138" font-size="11" fill="#be123c" font-weight="700">Brazil:</text>
  <text x="395" y="138" font-size="11" fill="#0f172a">80/40 = <tspan font-weight="700">2 bags</tspan></text>

  <line x1="318" y1="150" x2="582" y2="150" stroke="#cbd5e1"/>

  <text x="450" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Brazil has comparative</text>
  <text x="450" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">advantage in COMPUTERS</text>
  <text x="450" y="201" text-anchor="middle" font-size="10" fill="#15803d">(lower opp. cost: 2 &lt; 5)</text>

  <text x="310" y="465" text-anchor="middle" font-size="11" fill="#334155">Brazil's PPF is flatter ⇒ lower opp. cost of computers. Vietnam's is steeper ⇒ lower opp. cost of coffee. Both gain from specialisation.</text>
</svg>
