<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Short-Run Phillips Curve · UK Inflation-Unemployment Trade-off</text>

  <!-- Axes -->
  <line x1="100" y1="400" x2="580" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="100" y1="60" x2="100" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="515" y="420" font-size="12" font-weight="600" fill="#0f172a">Unemployment (%)</text>
  <text x="80" y="55" font-size="12" font-weight="600" fill="#0f172a">Inflation (%)</text>

  <!-- X-axis ticks (0-10%) -->
  <g font-size="10" fill="#475569">
    <line x1="100" y1="400" x2="100" y2="405" stroke="#0f172a"/>
    <text x="100" y="418" text-anchor="middle">0</text>
    <line x1="146" y1="400" x2="146" y2="405" stroke="#0f172a"/>
    <text x="146" y="418" text-anchor="middle">1</text>
    <line x1="192" y1="400" x2="192" y2="405" stroke="#0f172a"/>
    <text x="192" y="418" text-anchor="middle">2</text>
    <line x1="238" y1="400" x2="238" y2="405" stroke="#0f172a"/>
    <text x="238" y="418" text-anchor="middle" font-weight="700" fill="#be123c">3</text>
    <line x1="284" y1="400" x2="284" y2="405" stroke="#0f172a"/>
    <text x="284" y="418" text-anchor="middle">4</text>
    <line x1="330" y1="400" x2="330" y2="405" stroke="#0f172a"/>
    <text x="330" y="418" text-anchor="middle">5</text>
    <line x1="376" y1="400" x2="376" y2="405" stroke="#0f172a"/>
    <text x="376" y="418" text-anchor="middle" font-weight="700" fill="#0284c7">6</text>
    <line x1="422" y1="400" x2="422" y2="405" stroke="#0f172a"/>
    <text x="422" y="418" text-anchor="middle">7</text>
    <line x1="468" y1="400" x2="468" y2="405" stroke="#0f172a"/>
    <text x="468" y="418" text-anchor="middle">8</text>
    <line x1="514" y1="400" x2="514" y2="405" stroke="#0f172a"/>
    <text x="514" y="418" text-anchor="middle">9</text>
  </g>

  <!-- Y-axis ticks (0-8%) -->
  <g font-size="10" fill="#475569">
    <line x1="95" y1="400" x2="100" y2="400" stroke="#0f172a"/>
    <text x="92" y="404" text-anchor="end">0</text>
    <line x1="95" y1="360" x2="100" y2="360" stroke="#0f172a"/>
    <text x="92" y="364" text-anchor="end">1</text>
    <line x1="95" y1="320" x2="100" y2="320" stroke="#0f172a"/>
    <text x="92" y="324" text-anchor="end" font-weight="700" fill="#0284c7">2</text>
    <line x1="95" y1="280" x2="100" y2="280" stroke="#0f172a"/>
    <text x="92" y="284" text-anchor="end">3</text>
    <line x1="95" y1="240" x2="100" y2="240" stroke="#0f172a"/>
    <text x="92" y="244" text-anchor="end">4</text>
    <line x1="95" y1="200" x2="100" y2="200" stroke="#0f172a"/>
    <text x="92" y="204" text-anchor="end" font-weight="700" fill="#be123c">5</text>
    <line x1="95" y1="160" x2="100" y2="160" stroke="#0f172a"/>
    <text x="92" y="164" text-anchor="end">6</text>
    <line x1="95" y1="120" x2="100" y2="120" stroke="#0f172a"/>
    <text x="92" y="124" text-anchor="end">7</text>
    <line x1="95" y1="80" x2="100" y2="80" stroke="#0f172a"/>
    <text x="92" y="84" text-anchor="end">8</text>
  </g>

  <!-- SRPC (convex to origin) -->
  <path d="M 180 100 Q 240 220 300 285 T 560 395" fill="none" stroke="#0f172a" stroke-width="2.8"/>
  <text x="340" y="90" font-size="14" font-weight="700" fill="#0f172a">SRPC</text>

  <!-- Point A (6% unemployment, 2% inflation) at (376, 320) -->
  <circle cx="376" cy="320" r="6" fill="#0284c7" stroke="#0f172a" stroke-width="1.2"/>
  <line x1="100" y1="320" x2="376" y2="320" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="376" y1="320" x2="376" y2="400" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="388" y="316" font-size="13" font-weight="700" fill="#0284c7">A</text>
  <text x="388" y="332" font-size="10" fill="#0284c7">(6%, 2%)</text>

  <!-- Point B (3% unemployment, 5% inflation) at (238, 200) -->
  <circle cx="238" cy="200" r="6" fill="#be123c" stroke="#0f172a" stroke-width="1.2"/>
  <line x1="100" y1="200" x2="238" y2="200" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="238" y1="200" x2="238" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="247" y="196" font-size="13" font-weight="700" fill="#be123c">B</text>
  <text x="247" y="212" font-size="10" fill="#be123c">(3%, 5%)</text>

  <!-- Arrow from A to B along the curve -->
  <defs>
    <marker id="arrPC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
  </defs>
  <path d="M 365 318 Q 300 270 248 206" fill="none" stroke="#15803d" stroke-width="2.2" marker-end="url(#arrPC)"/>
  <text x="295" y="258" font-size="11" font-weight="700" fill="#15803d">↑AD</text>
  <text x="295" y="272" font-size="10" fill="#15803d">(fiscal stimulus)</text>

  <!-- Conclusion -->
  <text x="310" y="445" text-anchor="middle" font-size="11" fill="#334155">↑AD → lower unemployment (6%→3%), but tighter labour market → higher inflation (2%→5%). Movement ALONG the SRPC.</text>
</svg>
