<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="480" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Minimum Wage (National Living Wage £11.44) — UK Low-Skilled Labour Market</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="540" y="420" font-size="12" fill="#0f172a">Quantity of Labour (L)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Wage (£)</text>

  <line x1="130" y1="380" x2="540" y2="110" stroke="#be123c" stroke-width="2.5"/>
  <text x="545" y="115" font-size="12" font-weight="600" fill="#be123c">S_L</text>

  <line x1="130" y1="110" x2="540" y2="380" stroke="#0284c7" stroke-width="2.5"/>
  <text x="545" y="385" font-size="12" font-weight="600" fill="#0284c7">D_L (MRPL)</text>

  <circle cx="335" cy="245" r="5" fill="#0f172a"/>
  <line x1="90" y1="245" x2="335" y2="245" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="335" y1="245" x2="335" y2="400" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="249" font-size="11" font-weight="700" fill="#0f172a">We</text>
  <text x="335" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Le</text>

  <line x1="90" y1="180" x2="600" y2="180" stroke="#ca8a04" stroke-width="2.2" stroke-dasharray="6,3"/>
  <text x="605" y="184" font-size="11" font-weight="700" fill="#ca8a04">Wmin</text>
  <text x="65" y="184" text-anchor="end" font-size="10" font-weight="700" fill="#ca8a04">£11.44</text>

  <circle cx="236" cy="180" r="4.5" fill="#0284c7"/>
  <line x1="236" y1="180" x2="236" y2="400" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="236" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#0284c7">Ld</text>

  <circle cx="434" cy="180" r="4.5" fill="#be123c"/>
  <line x1="434" y1="180" x2="434" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="434" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Ls</text>

  <line x1="236" y1="155" x2="434" y2="155" stroke="#a16207" stroke-width="2"/>
  <line x1="236" y1="150" x2="236" y2="160" stroke="#a16207" stroke-width="2"/>
  <line x1="434" y1="150" x2="434" y2="160" stroke="#a16207" stroke-width="2"/>
  <text x="335" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">Excess supply = Unemployment</text>

  <text x="310" y="465" text-anchor="middle" font-size="11" fill="#334155">Wmin &gt; We → firms demand less labour (Ld), more workers want jobs (Ls). Gap Ls − Ld = unemployment.</text>
</svg>
