<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="480" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Minimum Price (Price Floor) · Sugar Cane Market</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="540" y="420" font-size="12" fill="#0f172a">Quantity of Sugar Cane</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price (P)</text>

  <!-- Supply -->
  <line x1="130" y1="380" x2="540" y2="110" stroke="#be123c" stroke-width="2.5"/>
  <text x="545" y="115" font-size="12" font-weight="600" fill="#be123c">S</text>

  <!-- Demand -->
  <line x1="130" y1="110" x2="540" y2="380" stroke="#15803d" stroke-width="2.5"/>
  <text x="545" y="385" font-size="12" font-weight="600" fill="#15803d">D</text>

  <!-- Equilibrium at (335, 245) -->
  <circle cx="335" cy="245" r="5" fill="#0f172a"/>
  <line x1="90" y1="245" x2="335" y2="245" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="335" y1="245" x2="335" y2="400" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="249" font-size="11" font-weight="700" fill="#0f172a">Pe</text>
  <text x="335" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Qe</text>

  <!-- Pmin ABOVE equilibrium at y=180 -->
  <line x1="90" y1="180" x2="600" y2="180" stroke="#ca8a04" stroke-width="2.2" stroke-dasharray="6,3"/>
  <text x="605" y="184" font-size="11" font-weight="700" fill="#ca8a04">Pmin</text>
  <text x="68" y="184" font-size="11" font-weight="700" fill="#ca8a04">Pmin</text>

  <!-- Qd on D at Pmin=180: 110+0.659(x-130)=180 -> 70=0.659(x-130) -> x=236.2 -->
  <circle cx="236" cy="180" r="4.5" fill="#15803d"/>
  <line x1="236" y1="180" x2="236" y2="400" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="236" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Qd</text>

  <!-- Qs on S at Pmin=180: 380-0.659(x-130)=180 -> 200=0.659(x-130) -> x=433.6 -->
  <circle cx="434" cy="180" r="4.5" fill="#be123c"/>
  <line x1="434" y1="180" x2="434" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="434" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Qs</text>

  <!-- Excess supply bracket -->
  <line x1="236" y1="165" x2="434" y2="165" stroke="#a16207" stroke-width="2"/>
  <line x1="236" y1="160" x2="236" y2="170" stroke="#a16207" stroke-width="2"/>
  <line x1="434" y1="160" x2="434" y2="170" stroke="#a16207" stroke-width="2"/>
  <text x="335" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">Excess supply (surplus)</text>

  <!-- Deadweight loss: triangle between Qd and Qe, bounded by S below and D above
       Vertices: (236, 180) Qd on D, (236, 309) on S at Qd: S y = 380-0.659*(236-130)=380-69.9=310.1, equilibrium (335, 245)
       Triangle: (236, 180), (236, 310), (335, 245) -->
  <polygon points="236,180 236,310 335,245" fill="#fecaca" fill-opacity="0.7" stroke="#991b1b" stroke-width="1.5"/>
  <text x="258" y="243" font-size="10" font-weight="700" fill="#991b1b">DWL</text>

  <text x="310" y="465" text-anchor="middle" font-size="11" fill="#334155">Pmin &gt; Pe → Qs &gt; Qd. Farmers produce more than buyers want; government may purchase surplus. Consumer surplus falls; welfare loss triangle.</text>
</svg>
