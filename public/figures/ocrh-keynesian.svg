<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="okh" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="okv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
    <marker id="oko" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#f97316"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">Keynesian AS Curve: UK Spare Capacity Stimulus</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#okv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#okh)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Price Level</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Real GDP (Y)</text>
  <!-- Keynesian AS: flat then curved then vertical -->
  <path d="M 100 360 L 300 360 Q 430 360 500 200 L 500 70" stroke="#2563eb" stroke-width="3.5" fill="none"/>
  <text x="505" y="65" font-size="16" font-weight="bold" font-family="Arial" fill="#2563eb">AS</text>
  <!-- Yf label -->
  <line x1="500" y1="430" x2="500" y2="435" stroke="#2563eb" stroke-width="2"/>
  <text x="500" y="455" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#2563eb">Yf</text>
  <!-- Region labels -->
  <text x="160" y="380" font-size="11" font-style="italic" font-family="Arial" fill="#2563eb">Elastic (spare capacity)</text>
  <text x="420" y="170" font-size="11" font-style="italic" font-family="Arial" fill="#2563eb" transform="rotate(-70,420,170)">Intermediate</text>
  <text x="510" y="130" font-size="11" font-style="italic" font-family="Arial" fill="#2563eb">Inelastic</text>
  <text x="510" y="145" font-size="11" font-style="italic" font-family="Arial" fill="#2563eb">(full emp.)</text>
  <!-- AD1 (red) -->
  <line x1="120" y1="160" x2="380" y2="420" stroke="#dc2626" stroke-width="3"/>
  <text x="385" y="425" font-size="15" font-weight="bold" font-family="Arial" fill="#dc2626">AD₁</text>
  <!-- AD2 (orange, shifted right) -->
  <line x1="220" y1="160" x2="500" y2="430" stroke="#f97316" stroke-width="3"/>
  <text x="505" y="435" font-size="15" font-weight="bold" font-family="Arial" fill="#f97316">AD₂</text>
  <!-- E1 at ~(240, 360) in flat region -->
  <circle cx="240" cy="360" r="6" fill="#222"/>
  <line x1="80" y1="360" x2="240" y2="360" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="240" y1="360" x2="240" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="365" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₁</text>
  <text x="240" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Y₁</text>
  <!-- E2 at ~(310, 355) still near flat -->
  <circle cx="310" cy="355" r="6" fill="#222"/>
  <line x1="80" y1="355" x2="310" y2="355" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="310" y1="355" x2="310" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="350" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₂</text>
  <text x="310" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Y₂</text>
  <!-- Shift arrow -->
  <path d="M 280 280 Q 320 275 360 270" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#oko)"/>
  <text x="280" y="265" font-size="12" font-family="Arial" fill="#f97316">AD shifts right (↑ G)</text>
</svg>