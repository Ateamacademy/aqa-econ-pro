<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="onmh" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="onmv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">UK Social Care: Monopsony Power</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#onmv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#onmh)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Wage Rate</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Quantity of Care Workers</text>
  <!-- ACL = S (blue) -->
  <line x1="100" y1="400" x2="560" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="565" y="78" font-size="13" font-weight="bold" font-family="Arial" fill="#2563eb">ACL = S</text>
  <!-- MCL (cyan, steeper) -->
  <line x1="100" y1="400" x2="400" y2="60" stroke="#06b6d4" stroke-width="3"/>
  <text x="405" y="55" font-size="14" font-weight="bold" font-family="Arial" fill="#06b6d4">MCL</text>
  <!-- MRPL = D (red) -->
  <line x1="100" y1="100" x2="560" y2="400" stroke="#dc2626" stroke-width="3"/>
  <text x="565" y="405" font-size="13" font-weight="bold" font-family="Arial" fill="#dc2626">MRPL = D</text>
  <!-- Competitive equilibrium at ~(330, 250) -->
  <circle cx="330" cy="250" r="6" fill="#222"/>
  <line x1="80" y1="250" x2="330" y2="250" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="330" y1="250" x2="330" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="255" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Wc</text>
  <text x="330" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Qc</text>
  <!-- MCL = MRPL at ~(260, 190) -->
  <circle cx="260" cy="190" r="6" fill="#222"/>
  <!-- W1 on ACL at Q1=260: ~(260, 310) -->
  <circle cx="260" cy="310" r="6" fill="#222"/>
  <line x1="260" y1="190" x2="260" y2="430" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="80" y1="310" x2="260" y2="310" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="315" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#dc2626">W₁</text>
  <text x="260" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#dc2626">Q₁</text>
  <!-- Lost wages rectangle -->
  <rect x="80" y="190" width="180" height="120" fill="#ec4899" fill-opacity="0.25" stroke="#ec4899" stroke-width="1.5"/>
  <text x="130" y="255" font-size="12" font-weight="bold" font-family="Arial" fill="#ec4899">Lost wages</text>
  <text x="130" y="272" font-size="12" font-weight="bold" font-family="Arial" fill="#ec4899">(under-pay)</text>
</svg>