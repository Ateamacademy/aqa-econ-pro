<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="480" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Negative Production Externality · UK Coal-Fired Electricity</text>

  <line x1="90" y1="410" x2="600" y2="410" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="410" stroke="#0f172a" stroke-width="2"/>
  <text x="555" y="430" font-size="12" fill="#0f172a">Quantity (Q)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price (£)</text>

  <!-- MPB = MSB = D (downward) -->
  <line x1="130" y1="120" x2="540" y2="390" stroke="#0284c7" stroke-width="2.6"/>
  <text x="545" y="395" font-size="11" font-weight="600" fill="#0284c7">MPB = MSB = D</text>

  <!-- MPC = Supply (upward) -->
  <line x1="130" y1="390" x2="540" y2="120" stroke="#15803d" stroke-width="2.6"/>
  <text x="545" y="125" font-size="11" font-weight="600" fill="#15803d">Supply = MPC</text>

  <!-- MSC (parallel above MPC, shifted up ~55px) -->
  <line x1="130" y1="335" x2="510" y2="85" stroke="#be123c" stroke-width="2.6"/>
  <text x="510" y="78" font-size="11" font-weight="600" fill="#be123c">MSC</text>

  <!-- MEC gap arrows -->
  <defs>
    <marker id="arrMECu" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#be123c"/></marker>
    <marker id="arrMECd" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 z" fill="#be123c"/></marker>
  </defs>
  <line x1="450" y1="168" x2="450" y2="223" stroke="#be123c" stroke-width="1.5" marker-start="url(#arrMECd)" marker-end="url(#arrMECu)"/>
  <text x="458" y="201" font-size="11" font-weight="700" fill="#be123c">MEC</text>

  <!-- Equilibria:
       MPB: (130,120)→(540,390) slope 0.659
       MPC: (130,390)→(540,120) slope -0.659
       Qm (MPC = MPB): 120 + 0.659(x-130) = 390 - 0.659(x-130) -> 1.318(x-130)=270 -> x=334.9, y=255
       MSC: (130,335)→(510,85) slope -250/380=-0.658
            y = 335 - 0.658(x-130)
       Q* (MSC = MSB): 120+0.659(x-130) = 335-0.658(x-130) -> 1.317(x-130)=215 -> x=293.3, y=227.6 -->
  
  <!-- Market equilibrium Qm at (335, 255) -->
  <circle cx="335" cy="255" r="5" fill="#0284c7"/>
  <line x1="90" y1="255" x2="335" y2="255" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="335" y1="255" x2="335" y2="410" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="259" font-size="11" font-weight="700" fill="#0284c7">Pm</text>
  <text x="335" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#0284c7">Qm</text>

  <!-- Social optimum Q* at (293, 227) -->
  <circle cx="293" cy="227" r="5" fill="#be123c"/>
  <line x1="90" y1="227" x2="293" y2="227" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="293" y1="227" x2="293" y2="410" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="231" font-size="11" font-weight="700" fill="#be123c">P*</text>
  <text x="293" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Q*</text>

  <!-- Welfare loss triangle: Q* at (293, 227) on MSC=MSB, 
       Qm point on MPB at (335, 255), 
       Point on MSC at x=335: y = 335 - 0.658*(335-130) = 335 - 134.9 = 200
       Triangle: (293, 227), (335, 255), (335, 200) -->
  <polygon points="293,227 335,255 335,200" fill="#64748b" fill-opacity="0.65" stroke="#0f172a" stroke-width="1.5"/>

  <!-- Welfare loss label with pointer -->
  <line x1="380" y1="180" x2="335" y2="220" stroke="#0f172a" stroke-width="1.3"/>
  <text x="385" y="176" font-size="11" font-weight="700" fill="#0f172a">Welfare Loss</text>
  <text x="385" y="190" font-size="10" fill="#0f172a">(deadweight loss)</text>

  <text x="310" y="465" text-anchor="middle" font-size="11" fill="#334155">MSC &gt; MPC by MEC. Free market over-produces (Qm &gt; Q*). Shaded triangle = deadweight welfare loss.</text>
</svg>
