<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Norwegian EV Market — Tax on Substitute Shifts Demand Right</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="545" y="420" font-size="12" fill="#0f172a">Quantity of EVs</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price (P)</text>

  <!-- Supply (upward) - unchanged -->
  <line x1="130" y1="380" x2="540" y2="100" stroke="#0284c7" stroke-width="2.5"/>
  <text x="545" y="105" font-size="12" font-weight="600" fill="#0284c7">S</text>

  <!-- D1 (original demand) -->
  <line x1="130" y1="110" x2="490" y2="380" stroke="#15803d" stroke-width="2.4"/>
  <text x="490" y="395" font-size="11" font-weight="600" fill="#15803d">D1</text>

  <!-- D2 (shifted RIGHT) -->
  <line x1="220" y1="110" x2="580" y2="380" stroke="#be123c" stroke-width="2.4" stroke-dasharray="5,3"/>
  <text x="585" y="395" font-size="11" font-weight="600" fill="#be123c">D2</text>

  <!-- Shift arrow -->
  <defs>
    <marker id="arrSD" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#be123c"/></marker>
  </defs>
  <path d="M 230 220 L 310 220" fill="none" stroke="#be123c" stroke-width="2" marker-end="url(#arrSD)"/>
  <text x="270" y="210" text-anchor="middle" font-size="10" fill="#be123c" font-style="italic">↑ tax on petrol cars</text>

  <!-- E1: D1 ∩ S
       D1: (130,110)→(490,380) slope 270/360=0.75, y=110+0.75(x-130)
       S:  (130,380)→(540,100) slope -280/410=-0.683, y=380-0.683(x-130)
       E1: 110+0.75(x-130)=380-0.683(x-130) -> 1.433(x-130)=270 -> x=318.4, y=251.3 -->
  <circle cx="318" cy="251" r="5" fill="#15803d"/>
  <line x1="90" y1="251" x2="318" y2="251" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="318" y1="251" x2="318" y2="400" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="255" font-size="11" font-weight="700" fill="#15803d">Pe1</text>
  <text x="318" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Qe1</text>

  <!-- E2: D2 ∩ S
       D2: (220,110)→(580,380) slope 270/360=0.75, y=110+0.75(x-220)
       E2: 110+0.75(x-220)=380-0.683(x-130)
       110+0.75x-165 = 380-0.683x+88.8
       -55+0.75x = 468.8-0.683x
       1.433x = 523.8 -> x=365.5, y=110+0.75*(365.5-220)=219.1 -->
  <circle cx="366" cy="219" r="5" fill="#be123c"/>
  <line x1="90" y1="219" x2="366" y2="219" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="366" y1="219" x2="366" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="223" font-size="11" font-weight="700" fill="#be123c">Pe2</text>
  <text x="366" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Qe2</text>

  <text x="310" y="455" text-anchor="middle" font-size="11" fill="#334155">Tax on substitute (petrol cars) raises their price → consumers switch to EVs → D shifts right → Pe ↑ and Qe ↑.</text>
</svg>
