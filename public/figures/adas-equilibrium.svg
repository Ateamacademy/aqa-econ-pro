<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 460" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="460" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">AD/AS Equilibrium — UK Infrastructure Spending (£20bn)</text>

  <!-- Axes -->
  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="555" y="420" font-size="12" fill="#0f172a">Real GDP (Y)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price Level (PL)</text>

  <!-- LRAS vertical at x=480 (full-employment output) -->
  <line x1="480" y1="60" x2="480" y2="400" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="485" y="75" font-size="12" font-weight="700" fill="#7c3aed">LRAS</text>

  <!-- SRAS (upward sloping) -->
  <line x1="130" y1="380" x2="570" y2="100" stroke="#0284c7" stroke-width="2.5"/>
  <text x="575" y="105" font-size="12" font-weight="600" fill="#0284c7">SRAS</text>

  <!-- AD1 -->
  <line x1="130" y1="100" x2="500" y2="380" stroke="#15803d" stroke-width="2.5"/>
  <text x="500" y="395" font-size="12" font-weight="600" fill="#15803d">AD1</text>

  <!-- AD2 (shifted right) -->
  <line x1="210" y1="100" x2="580" y2="380" stroke="#be123c" stroke-width="2.5"/>
  <text x="585" y="395" font-size="12" font-weight="600" fill="#be123c">AD2</text>

  <!-- Shift arrow -->
  <defs>
    <marker id="arrAD" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#be123c"/>
    </marker>
  </defs>
  <path d="M 200 180 L 280 180" fill="none" stroke="#be123c" stroke-width="2" marker-end="url(#arrAD)"/>
  <text x="240" y="170" text-anchor="middle" font-size="10" fill="#be123c" font-style="italic">↑G shifts AD right</text>

  <!-- Equilibrium 1 at (331, 252) -->
  <circle cx="331" cy="252" r="5" fill="#15803d"/>
  <line x1="90" y1="252" x2="331" y2="252" stroke="#15803d" stroke-dasharray="4,4" stroke-width="1.3"/>
  <line x1="331" y1="252" x2="331" y2="400" stroke="#15803d" stroke-dasharray="4,4" stroke-width="1.3"/>
  <text x="65" y="256" font-size="11" font-weight="700" fill="#15803d">PL1</text>
  <text x="331" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Y1</text>

  <!-- Equilibrium 2 at (374, 225) -->
  <circle cx="374" cy="225" r="5" fill="#be123c"/>
  <line x1="90" y1="225" x2="374" y2="225" stroke="#be123c" stroke-dasharray="4,4" stroke-width="1.3"/>
  <line x1="374" y1="225" x2="374" y2="400" stroke="#be123c" stroke-dasharray="4,4" stroke-width="1.3"/>
  <text x="65" y="229" font-size="11" font-weight="700" fill="#be123c">PL2</text>
  <text x="374" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Y2</text>

  <!-- YP marker -->
  <text x="480" y="415" text-anchor="middle" font-size="11" fill="#7c3aed">YP</text>

  <text x="310" y="445" text-anchor="middle" font-size="11" fill="#334155">£20bn ↑G expands AD₁→AD₂ → real output rises (Y₁→Y₂) and price level rises (PL₁→PL₂)</text>
</svg>
