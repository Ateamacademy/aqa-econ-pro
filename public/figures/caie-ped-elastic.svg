<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" font-family="Arial, sans-serif">
  <rect width="700" height="540" fill="#ffffff"/>
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .d  { stroke:#1976d2; stroke-width:2.5; fill:none; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .gained { fill:#66bb6a; opacity:0.55; stroke:#1b5e20; stroke-width:1; }
    .lost   { fill:#ef5350; opacity:0.55; stroke:#b71c1c; stroke-width:1; }
    .arrow { stroke:#1b5e20; stroke-width:2.2; fill:none; marker-end:url(#a); }
    .lbl   { font-size:13px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pt    { fill:#111; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1b5e20"/>
    </marker>
  </defs>

  <text x="350" y="28" text-anchor="middle" class="ttl">PED &amp; Revenue · Supermarket Smartphone Price Cut</text>
  <text x="350" y="48" text-anchor="middle" class="sub">When demand is price elastic (|PED| &gt; 1), a price cut increases total revenue</text>

  <line class="axis" x1="90"  y1="80"  x2="90"  y2="450"/>
  <line class="axis" x1="90"  y1="450" x2="640" y2="450"/>
  <text x="55"  y="80"  class="lblB">Price (£)</text>
  <text x="540" y="475" class="lblB">Quantity demanded</text>

  <!-- Demand curve (relatively flat = elastic): from (110, 130) to (610, 380); slope = (380-130)/(610-110) = 0.5
       y = 0.5x + 75 (intercept at x=0: 75; at x=110, y=130 ✓) -->
  <line class="d" x1="110" y1="130" x2="610" y2="380"/>
  <text x="615" y="380" class="lbl" fill="#1976d2">D (elastic)</text>

  <!-- P1 (high price) at y=190 → x = (190-75)/0.5 = 230. So Q1 = 230. -->
  <!-- P2 (low price after cut) at y=270 → x = (270-75)/0.5 = 390. So Q2 = 390. -->

  <!-- Revenue LOST rectangle (top strip): width Q1=140, height (P1-P2)=80
       From (90, 190) to (230, 270): width=140, height=80 -->
  <rect class="lost" x="90" y="190" width="140" height="80"/>

  <!-- Revenue GAINED rectangle (bottom strip): from (230, 270) to (390, 450) but only at price level P2
       Width = Q2-Q1 = 160, height = P2 from axis = 450-270=180 -->
  <rect class="gained" x="230" y="270" width="160" height="180"/>

  <!-- Original revenue rectangle outline only (P1 × Q1): from (90, 190) to (230, 450) -->
  <line class="dotted" x1="90"  y1="190" x2="230" y2="190"/>
  <line class="dotted" x1="230" y1="190" x2="230" y2="450"/>

  <!-- New revenue: from (90, 270) to (390, 450) -->
  <line class="dotted" x1="90"  y1="270" x2="390" y2="270"/>
  <line class="dotted" x1="390" y1="270" x2="390" y2="450"/>

  <!-- Equilibrium points -->
  <circle class="pt" cx="230" cy="190" r="4.5"/>
  <circle class="pt" cx="390" cy="270" r="4.5"/>

  <!-- P1 / P2 labels -->
  <text x="60"  y="195" class="lblB">P1</text>
  <text x="60"  y="275" class="lblB">P2</text>

  <!-- Q1 / Q2 labels -->
  <text x="220" y="468" class="lblB">Q1</text>
  <text x="380" y="468" class="lblB">Q2</text>

  <!-- E1 / E2 labels -->
  <text x="238" y="187" class="lbl">E1</text>
  <text x="398" y="266" class="lbl">E2</text>

  <!-- Price-cut arrow -->
  <path class="arrow" d="M 410 195 q 5 30 -10 60"/>
  <text x="415" y="225" class="lbl" fill="#1b5e20">Price cut</text>

  <!-- Labels for the two areas -->
  <text x="120" y="235" class="lblB" fill="#b71c1c">Revenue LOST</text>
  <text x="120" y="252" class="lbl"  fill="#b71c1c">(P↓ on Q1 units)</text>
  
  <text x="270" y="370" class="lblB" fill="#1b5e20">Revenue GAINED</text>
  <text x="270" y="387" class="lbl"  fill="#1b5e20">(extra units sold at P2)</text>

  <text x="90"  y="495" class="sub">Lower price loses revenue on the original Q1 units sold (red strip), but gains revenue on extra (Q2 − Q1) units (green block).</text>
  <text x="90"  y="512" class="sub">When |PED| &gt; 1, the green &gt; red → total revenue rises. Strategy is profitable if marginal cost is sufficiently low.</text>
  <text x="90"  y="529" class="sub">Rule: cut price when demand is elastic; raise price when demand is inelastic. TR is maximised where |PED| = 1.</text>
</svg>
