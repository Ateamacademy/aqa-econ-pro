<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Price Elastic Demand (PED = −2.5) — Revenue Effect of a Price Cut</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="540" y="420" font-size="12" fill="#0f172a">Quantity (Q)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price (P)</text>

  <!-- Relatively FLAT demand (elastic) from (130,180) to (570,310) -->
  <line x1="130" y1="180" x2="570" y2="310" stroke="#be123c" stroke-width="2.8"/>
  <text x="575" y="315" font-size="12" font-weight="600" fill="#be123c">D (elastic)</text>

  <!-- Pick P1, Q1 and P2, Q2:
       On D: y = 180 + (310-180)/(570-130) * (x - 130) = 180 + 0.295(x-130)
       At P1 = y=220 → 40 = 0.295(x-130) → x ≈ 265.6 (Q1)
       10% price cut: P2 = 198 → 18 = 0.295(x-130) → x ≈ 191 no wait that's moving LEFT. Hmm.
       
       I'm working with pixel coords where smaller y = higher P.
       If P1 = 220 (pixel y), then lower price P2 = 252 (pixel y, further down).
       At y=252: 72 = 0.295(x-130) → x = 374.1 (Q2)
       So P1=220 pixel at Q1=266, P2=252 pixel at Q2=374. Good — price cut → quantity rise.
  -->

  <!-- Reference points -->
  <circle cx="266" cy="220" r="4" fill="#0f172a"/>
  <circle cx="374" cy="252" r="4" fill="#0f172a"/>

  <!-- Dashed coordinates -->
  <line x1="90" y1="220" x2="266" y2="220" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1"/>
  <line x1="266" y1="220" x2="266" y2="400" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="68" y="224" font-size="11" font-weight="700" fill="#0f172a">P1</text>
  <text x="266" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Q1</text>

  <line x1="90" y1="252" x2="374" y2="252" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1"/>
  <line x1="374" y1="252" x2="374" y2="400" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="68" y="256" font-size="11" font-weight="700" fill="#0f172a">P2</text>
  <text x="374" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Q2</text>

  <!-- Revenue LOSS rectangle: from y=220 to y=252, x=90 to x=266 -->
  <rect x="90" y="220" width="176" height="32" fill="#fecaca" fill-opacity="0.7" stroke="#991b1b" stroke-width="1.3"/>
  <text x="178" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Revenue LOSS</text>

  <!-- Revenue GAIN rectangle: from y=252 to y=400, x=266 to x=374 -->
  <rect x="266" y="252" width="108" height="148" fill="#bbf7d0" fill-opacity="0.65" stroke="#14532d" stroke-width="1.3"/>
  <text x="320" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Revenue</text>
  <text x="320" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">GAIN</text>

  <!-- Annotation -->
  <rect x="415" y="80" width="170" height="85" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1"/>
  <text x="500" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">|PED| = 2.5</text>
  <text x="500" y="118" text-anchor="middle" font-size="10" fill="#1e3a8a">10% price cut →</text>
  <text x="500" y="132" text-anchor="middle" font-size="10" fill="#1e3a8a">25% quantity rise</text>
  <text x="500" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">Gain &gt; Loss</text>
  <text x="500" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">→ TR rises</text>

  <text x="310" y="450" text-anchor="middle" font-size="11" fill="#334155">Elastic demand: proportional Q rise (25%) &gt; proportional P fall (10%) → total revenue INCREASES.</text>
</svg>
