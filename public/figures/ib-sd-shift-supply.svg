<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Lithium-Ion Battery Market — Technology + New Reserves Shift Supply Right</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="545" y="420" font-size="12" fill="#0f172a">Quantity of Batteries</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price (P)</text>

  <!-- Demand (downward) - unchanged -->
  <line x1="130" y1="110" x2="540" y2="380" stroke="#15803d" stroke-width="2.5"/>
  <text x="545" y="385" font-size="12" font-weight="600" fill="#15803d">D</text>

  <!-- S1 -->
  <line x1="130" y1="380" x2="490" y2="110" stroke="#0284c7" stroke-width="2.4"/>
  <text x="490" y="100" font-size="11" font-weight="600" fill="#0284c7">S1</text>

  <!-- S2 (shifted RIGHT - equivalent to shift down) -->
  <line x1="220" y1="380" x2="580" y2="110" stroke="#be123c" stroke-width="2.4" stroke-dasharray="5,3"/>
  <text x="585" y="100" font-size="11" font-weight="600" fill="#be123c">S2</text>

  <!-- Shift arrow -->
  <defs>
    <marker id="arrSS" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#be123c"/></marker>
  </defs>
  <path d="M 310 250 L 380 250" fill="none" stroke="#be123c" stroke-width="2" marker-end="url(#arrSS)"/>
  <text x="345" y="240" text-anchor="middle" font-size="10" fill="#be123c" font-style="italic">↓ production costs</text>

  <!-- E1: D ∩ S1
       D: (130,110)→(540,380) slope 270/410=0.659, y=110+0.659(x-130)
       S1: (130,380)→(490,110) slope -270/360=-0.75, y=380-0.75(x-130)
       110+0.659(x-130)=380-0.75(x-130) -> 1.409(x-130)=270 -> x=321.6, y=236.1 -->
  <circle cx="322" cy="236" r="5" fill="#0284c7"/>
  <line x1="90" y1="236" x2="322" y2="236" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="322" y1="236" x2="322" y2="400" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="240" font-size="11" font-weight="700" fill="#0284c7">Pe1</text>
  <text x="322" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0284c7">Qe1</text>

  <!-- E2: D ∩ S2
       S2: (220,380)→(580,110) slope -270/360=-0.75, y=380-0.75(x-220)
       110+0.659(x-130)=380-0.75(x-220)
       110+0.659x-85.67=380-0.75x+165
       24.33+0.659x = 545 - 0.75x
       1.409x = 520.67 -> x=369.5, y=110+0.659*(369.5-130) = 110+157.9=267.9 -->
  <circle cx="370" cy="268" r="5" fill="#be123c"/>
  <line x1="90" y1="268" x2="370" y2="268" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="370" y1="268" x2="370" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="272" font-size="11" font-weight="700" fill="#be123c">Pe2</text>
  <text x="370" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Qe2</text>

  <text x="310" y="455" text-anchor="middle" font-size="11" fill="#334155">Lower input costs → supply shifts right → equilibrium price FALLS (Pe1→Pe2), quantity RISES (Qe1→Qe2).</text>
</svg>
