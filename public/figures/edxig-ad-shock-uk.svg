<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="700" height="500" fill="#fff"/>
  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Demand-Side Shock: UK Consumer Confidence Fall</text>
  <!-- Axes -->
  <line x1="80" y1="60" x2="80" y2="440" stroke="#1e293b" stroke-width="2.5"/>
  <line x1="80" y1="440" x2="650" y2="440" stroke="#1e293b" stroke-width="2.5"/>
  <text x="35" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b" transform="rotate(-90,35,250)">Price Level</text>
  <text x="380" y="485" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Real GDP (Y)</text>
  <!-- AS -->
  <line x1="120" y1="410" x2="600" y2="80" stroke="#3b82f6" stroke-width="3"/>
  <text x="610" y="75" font-size="15" font-weight="700" fill="#3b82f6">AS</text>
  <!-- AD1 -->
  <line x1="140" y1="90" x2="580" y2="420" stroke="#ef4444" stroke-width="3"/>
  <text x="585" y="430" font-size="15" font-weight="700" fill="#ef4444">AD₁</text>
  <!-- AD2 shifted left -->
  <line x1="100" y1="130" x2="450" y2="420" stroke="#f97316" stroke-width="3"/>
  <text x="455" y="430" font-size="15" font-weight="700" fill="#f97316">AD₂</text>
  <!-- E1 at approx (350, 240) -->
  <circle cx="350" cy="240" r="5" fill="#1e293b" stroke="#fff" stroke-width="1.5"/>
  <line x1="80" y1="240" x2="350" y2="240" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <line x1="350" y1="240" x2="350" y2="440" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <text x="60" y="245" text-anchor="end" font-size="14" fill="#1e293b">P₁</text>
  <text x="350" y="458" text-anchor="middle" font-size="14" fill="#1e293b">Y₁</text>
  <!-- E2 at approx (250, 295) -->
  <circle cx="250" cy="295" r="5" fill="#1e293b" stroke="#fff" stroke-width="1.5"/>
  <line x1="80" y1="295" x2="250" y2="295" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <line x1="250" y1="295" x2="250" y2="440" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <text x="60" y="300" text-anchor="end" font-size="14" fill="#1e293b">P₂</text>
  <text x="250" y="458" text-anchor="middle" font-size="14" fill="#1e293b">Y₂</text>
  <!-- Shift arrow -->
  <defs><marker id="arrADL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/></marker></defs>
  <path d="M 420 260 Q 360 260 300 260" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#arrADL)"/>
  <text x="280" y="190" font-size="13" fill="#f97316" font-weight="600">AD shifts left</text>
  <text x="280" y="208" font-size="12" fill="#f97316">(↓ Consumption)</text>
</svg>