<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="Arial, sans-serif">
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .d  { stroke:#1976d2; stroke-width:2.5; fill:none; }
    .mr { stroke:#7b1fa2; stroke-width:2.5; fill:none; }
    .mc { stroke:#2e7d32; stroke-width:2.5; fill:none; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .lbl   { font-size:13px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pnl   { font-size:14px; font-weight:700; fill:#333; }
    .pt    { fill:#111; }
  </style>

  <text x="550" y="28" text-anchor="middle" class="ttl">Third-Degree Price Discrimination — Airline Pricing</text>
  <text x="550" y="48" text-anchor="middle" class="sub">Same MC; charge higher price to inelastic market (business), lower price to elastic market (leisure)</text>

  <text x="195" y="78" text-anchor="middle" class="pnl">Business Travellers</text>
  <text x="195" y="94" text-anchor="middle" class="sub">(PED &lt; 1: inelastic)</text>
  <line class="axis" x1="80"  y1="110" x2="80"  y2="450"/>
  <line class="axis" x1="80"  y1="450" x2="350" y2="450"/>
  <text x="40"  y="110" class="lblB">Price</text>
  <text x="290" y="475" class="lbl">Quantity</text>

  <line class="d" x1="95" y1="130" x2="260" y2="440"/>
  <text x="265" y="440" class="lbl" fill="#1976d2">D</text>

  <line class="mr" x1="95" y1="309" x2="130" y2="440"/>
  <text x="105" y="380" class="lbl" fill="#7b1fa2">MR</text>

  <line class="mc" x1="80" y1="350" x2="350" y2="350"/>
  <text x="358" y="354" class="lbl" fill="#2e7d32">MC</text>

  <circle class="pt" cx="106" cy="350" r="4"/>
  <line class="dotted" x1="106" y1="350" x2="106" y2="450"/>
  <text x="98"  y="468" class="lblB">Q1</text>

  <line class="dotted" x1="106" y1="350" x2="106" y2="151"/>
  <circle class="pt" cx="106" cy="151" r="4"/>
  <line class="dotted" x1="106" y1="151" x2="80"  y2="151"/>
  <text x="55"  y="156" class="lblB">P1</text>

  <text x="540" y="78" text-anchor="middle" class="pnl">Leisure Travellers</text>
  <text x="540" y="94" text-anchor="middle" class="sub">(PED &gt; 1: elastic)</text>
  <line class="axis" x1="400" y1="110" x2="400" y2="450"/>
  <line class="axis" x1="400" y1="450" x2="700" y2="450"/>
  <text x="370" y="110" class="lblB">Price</text>
  <text x="640" y="475" class="lbl">Quantity</text>

  <line class="d" x1="415" y1="250" x2="680" y2="440"/>
  <text x="685" y="440" class="lbl" fill="#1976d2">D</text>

  <line class="mr" x1="400" y1="239" x2="540" y2="440"/>
  <text x="460" y="380" class="lbl" fill="#7b1fa2">MR</text>

  <line class="mc" x1="400" y1="350" x2="700" y2="350"/>
  <text x="708" y="354" class="lbl" fill="#2e7d32">MC</text>

  <circle class="pt" cx="477" cy="350" r="4"/>
  <line class="dotted" x1="477" y1="350" x2="477" y2="450"/>
  <text x="469" y="468" class="lblB">Q2</text>

  <line class="dotted" x1="477" y1="350" x2="477" y2="294"/>
  <circle class="pt" cx="477" cy="294" r="4"/>
  <line class="dotted" x1="477" y1="294" x2="400" y2="294"/>
  <text x="375" y="299" class="lblB">P2</text>

  <text x="900" y="78" text-anchor="middle" class="pnl">Total Market</text>
  <text x="900" y="94" text-anchor="middle" class="sub">(without discrimination: single price)</text>
  <line class="axis" x1="750" y1="110" x2="750" y2="450"/>
  <line class="axis" x1="750" y1="450" x2="1060" y2="450"/>
  <text x="720" y="110" class="lblB">Price</text>
  <text x="990" y="475" class="lbl">Quantity</text>

  <line class="d" x1="765" y1="175" x2="1040" y2="440"/>
  <text x="1045" y="440" class="lbl" fill="#1976d2">D (sum)</text>

  <line class="mr" x1="765" y1="175" x2="905" y2="440"/>
  <text x="820" y="380" class="lbl" fill="#7b1fa2">MR</text>

  <line class="mc" x1="750" y1="350" x2="1060" y2="350"/>
  <text x="1068" y="354" class="lbl" fill="#2e7d32">MC</text>

  <circle class="pt" cx="857" cy="350" r="4"/>
  <line class="dotted" x1="857" y1="350" x2="857" y2="450"/>
  <text x="849" y="468" class="lblB">Q3</text>

  <line class="dotted" x1="857" y1="350" x2="857" y2="263"/>
  <circle class="pt" cx="857" cy="263" r="4"/>
  <line class="dotted" x1="857" y1="263" x2="750" y2="263"/>
  <text x="725" y="268" class="lblB">P3</text>

  <text x="80"  y="510" class="sub">Inelastic market (business): firm sets MR=MC and charges high P1 — passengers must travel for work and won't change behaviour much.</text>
  <text x="80"  y="528" class="sub">Elastic market (leisure): firm sets MR=MC and charges lower P2 — sensitive buyers respond strongly to price. Higher total profit than uniform pricing P3.</text>
</svg>
