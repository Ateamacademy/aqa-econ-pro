<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Specific Indirect Tax — Sugary Drinks with Inelastic Demand</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="545" y="420" font-size="12" fill="#0f172a">Quantity (Q)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price (P)</text>

  <!-- Steep inelastic demand -->
  <line x1="275" y1="80" x2="350" y2="400" stroke="#15803d" stroke-width="2.6"/>
  <text x="355" y="395" font-size="11" font-weight="600" fill="#15803d">D (inelastic)</text>

  <!-- S1 -->
  <line x1="130" y1="380" x2="540" y2="140" stroke="#0284c7" stroke-width="2.4"/>
  <text x="540" y="135" font-size="11" font-weight="600" fill="#0284c7">S1</text>

  <!-- S1 + Tax (parallel up) -->
  <line x1="130" y1="320" x2="540" y2="80" stroke="#be123c" stroke-width="2.4"/>
  <text x="540" y="75" font-size="11" font-weight="600" fill="#be123c">S1 + Tax</text>

  <!-- Reuse same equilibria from OCR indirect tax figure: E1 (319, 269), E2 (307, 217), Pnet (307, 277) -->

  <circle cx="319" cy="269" r="5" fill="#0f172a"/>
  <line x1="90" y1="269" x2="319" y2="269" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="319" y1="269" x2="319" y2="400" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="273" font-size="11" font-weight="700" fill="#0f172a">P1</text>
  <text x="319" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Q1</text>

  <circle cx="307" cy="217" r="5" fill="#be123c"/>
  <line x1="90" y1="217" x2="307" y2="217" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="307" y1="217" x2="307" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="221" font-size="11" font-weight="700" fill="#be123c">P2</text>
  <text x="307" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Q2</text>

  <circle cx="307" cy="277" r="5" fill="#d97706"/>
  <line x1="90" y1="277" x2="307" y2="277" stroke="#d97706" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="45" y="281" font-size="11" font-weight="700" fill="#d97706">Pnet</text>

  <!-- Consumer burden (top) -->
  <rect x="90" y="217" width="217" height="52" fill="#bfdbfe" fill-opacity="0.65" stroke="#1e3a8a" stroke-width="1"/>
  <text x="198" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Consumer burden</text>

  <!-- Producer burden (bottom) -->
  <rect x="90" y="269" width="217" height="8" fill="#bbf7d0" fill-opacity="0.8" stroke="#14532d" stroke-width="1"/>
  <text x="360" y="278" font-size="10" font-weight="700" fill="#14532d">Producer burden (small)</text>

  <!-- Tax gap bracket on right side -->
  <defs>
    <marker id="arrTxU" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#be123c"/></marker>
    <marker id="arrTxD" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 z" fill="#be123c"/></marker>
  </defs>
  <line x1="440" y1="217" x2="440" y2="277" stroke="#be123c" stroke-width="1.3" marker-start="url(#arrTxD)" marker-end="url(#arrTxU)"/>
  <text x="448" y="250" font-size="11" font-weight="700" fill="#be123c">Tax</text>

  <text x="310" y="455" text-anchor="middle" font-size="11" fill="#334155">Inelastic D → consumers bear most of tax. Consumer burden (P1→P2) &gt; producer burden (P1→Pnet). Weak Q fall means policy raises revenue but only modestly curbs consumption.</text>
</svg>
