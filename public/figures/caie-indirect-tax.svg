<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" font-family="Arial, sans-serif">
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .curve { stroke-width:2.5; fill:none; }
    .d  { stroke:#1976d2; }
    .s1 { stroke:#c62828; }
    .s2 { stroke:#7f0000; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .arrow { stroke:#7f0000; stroke-width:2.2; fill:none; marker-end:url(#a); }
    .revenue { fill:#fff59d; opacity:0.55; stroke:#827717; stroke-width:1; }
    .wedgeLine { stroke:#5e35b1; stroke-width:2; fill:none; }
    .incCons { stroke:#1565c0; stroke-width:1.6; fill:none; }
    .incProd { stroke:#2e7d32; stroke-width:1.6; fill:none; }
    .lbl   { font-size:13px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pt    { fill:#111; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f0000"/>
    </marker>
    <marker id="purple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5e35b1"/>
    </marker>
    <marker id="blueArr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565c0"/>
    </marker>
    <marker id="greenArr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="350" y="28" text-anchor="middle" class="ttl">Specific Tax on Cigarettes — Developing Country</text>
  <text x="350" y="48" text-anchor="middle" class="sub">A per-unit (specific) tax shifts Supply parallel up by the tax amount: S1 → S2</text>

  <line class="axis" x1="90"  y1="80"  x2="90"  y2="450"/>
  <line class="axis" x1="90"  y1="450" x2="640" y2="450"/>
  <text x="55"  y="80"  class="lblB">Price (P)</text>
  <text x="600" y="475" class="lblB">Quantity (Q)</text>

  <!-- Tax revenue rectangle: x[90, 314], y[225, 286] -->
  <rect class="revenue" x="90" y="225" width="224" height="61"/>

  <line class="curve d" x1="120" y1="130" x2="600" y2="430"/>
  <text x="610" y="430" class="lbl" fill="#1976d2">D</text>

  <line class="curve s1" x1="130" y1="430" x2="600" y2="130"/>
  <text x="610" y="130" class="lbl" fill="#c62828">S1</text>

  <line class="curve s2" x1="90" y1="396" x2="506" y2="130"/>
  <text x="510" y="130" class="lbl" fill="#7f0000">S2 = S + tax</text>

  <!-- E1: D ∩ S1 → x≈363, y≈282 -->
  <circle class="pt" cx="363" cy="282" r="4.5"/>
  <line class="dotted" x1="363" y1="282" x2="363" y2="450"/>
  <line class="dotted" x1="363" y1="282" x2="90"  y2="282"/>
  <text x="60"  y="287" class="lblB">P1</text>
  <text x="357" y="468" class="lblB">Q1</text>
  <text x="370" y="278" class="lbl">E1</text>

  <circle class="pt" cx="314" cy="252" r="4.5"/>
  <line class="dotted" x1="314" y1="252" x2="314" y2="450"/>
  <line class="dotted" x1="314" y1="252" x2="90"  y2="252"/>
  <text x="60"  y="225" class="lblB">P2</text>
  <text x="307" y="468" class="lblB">Q2</text>
  <text x="285" y="248" class="lbl">E2</text>

  <circle class="pt" cx="314" cy="313" r="4.5"/>
  <line class="dotted" x1="314" y1="313" x2="90"  y2="313"/>
  <text x="32"  y="318" class="lblB">P_prod</text>

  <line class="dotted" x1="314" y1="252" x2="90"  y2="252"/>

  <!-- Tax wedge bracket on the right at Q2 -->
  <line class="wedgeLine" x1="385" y1="252" x2="385" y2="313" marker-start="url(#purple)" marker-end="url(#purple)"/>
  <text x="395" y="278" class="lblB" fill="#5e35b1">Tax wedge</text>
  <text x="395" y="294" class="lbl"  fill="#5e35b1">(per unit)</text>

  <!-- Consumer & Producer incidence brackets to the right -->
  <line class="incCons" x1="500" y1="252" x2="500" y2="282" marker-start="url(#blueArr)" marker-end="url(#blueArr)"/>
  <text x="510" y="262" class="lbl" fill="#1565c0">Consumer</text>
  <text x="510" y="276" class="lbl" fill="#1565c0">incidence</text>

  <line class="incProd" x1="500" y1="282" x2="500" y2="313" marker-start="url(#greenArr)" marker-end="url(#greenArr)"/>
  <text x="510" y="294" class="lbl" fill="#2e7d32">Producer</text>
  <text x="510" y="308" class="lbl" fill="#2e7d32">incidence</text>

  <!-- Connect incidence brackets to price levels -->
  <line class="dotted" x1="370" y1="252" x2="500" y2="252"/>
  <line class="dotted" x1="370" y1="282" x2="500" y2="282"/>
  <line class="dotted" x1="370" y1="313" x2="500" y2="313"/>

  <!-- Tax revenue label inside the rectangle -->
  <text x="200" y="262" class="lblB" fill="#827717" text-anchor="middle">Tax revenue</text>

  <!-- Shift arrow showing parallel upward shift -->
  <path class="arrow" d="M 240 360 q -10 -40 -55 -50"/>
  <text x="220" y="380" class="lbl" fill="#7f0000">S shifts up</text>

  <text x="90"  y="495" class="sub">Specific (per-unit) tax raises sellers' costs by a fixed £ amount → S shifts parallel up. New equilibrium: P↑, Q↓.</text>
  <text x="90"  y="512" class="sub">Tax wedge = P2 (consumer pays) − P_prod (seller keeps). Yellow box = tax revenue = wedge × Q2.</text>
  <text x="90"  y="529" class="sub">Cigarette demand is highly inelastic (addictive) → consumers bear most of the burden; quantity falls only modestly.</text>
</svg>
