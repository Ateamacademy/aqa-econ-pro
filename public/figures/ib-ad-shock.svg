<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Germany AD Shock · Falling Consumer Confidence (2024)</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="545" y="420" font-size="12" fill="#0f172a">Real GDP (Y)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price Level</text>

  <!-- SRAS -->
  <line x1="130" y1="380" x2="570" y2="100" stroke="#0284c7" stroke-width="2.5"/>
  <text x="575" y="105" font-size="12" font-weight="600" fill="#0284c7">SRAS</text>

  <!-- AD1 (original) -->
  <line x1="230" y1="100" x2="580" y2="380" stroke="#15803d" stroke-width="2.4"/>
  <text x="585" y="395" font-size="11" font-weight="600" fill="#15803d">AD1</text>

  <!-- AD2 (shifted LEFT) -->
  <line x1="130" y1="100" x2="480" y2="380" stroke="#be123c" stroke-width="2.4" stroke-dasharray="5,3"/>
  <text x="485" y="395" font-size="11" font-weight="600" fill="#be123c">AD2</text>

  <!-- Shift arrow -->
  <defs>
    <marker id="arrAD" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#be123c"/></marker>
  </defs>
  <path d="M 350 170 L 280 170" fill="none" stroke="#be123c" stroke-width="2" marker-end="url(#arrAD)"/>
  <text x="315" y="160" text-anchor="middle" font-size="10" fill="#be123c" font-style="italic">↓C (consumer confidence)</text>

  <!-- E1: AD1 ∩ SRAS
       AD1: (230,100)→(580,380) slope 280/350=0.8, y=100+0.8(x-230)
       SRAS: (130,380)→(570,100) slope -280/440=-0.636, y=380-0.636(x-130)
       100+0.8(x-230)=380-0.636(x-130) -> 0.8x-184+0.636x-82.68=280 -> 1.436x=546.68 -> x=380.7, y=220.5 -->
  <circle cx="381" cy="221" r="5" fill="#15803d"/>
  <line x1="90" y1="221" x2="381" y2="221" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="381" y1="221" x2="381" y2="400" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="225" font-size="11" font-weight="700" fill="#15803d">P1</text>
  <text x="381" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Y1</text>

  <!-- E2: AD2 ∩ SRAS
       AD2: (130,100)→(480,380) slope 280/350=0.8, y=100+0.8(x-130)
       100+0.8(x-130)=380-0.636(x-130) -> 1.436(x-130)=280 -> x=325, y=256 -->
  <circle cx="325" cy="256" r="5" fill="#be123c"/>
  <line x1="90" y1="256" x2="325" y2="256" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="325" y1="256" x2="325" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="260" font-size="11" font-weight="700" fill="#be123c">P2</text>
  <text x="325" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Y2</text>

  <text x="310" y="455" text-anchor="middle" font-size="11" fill="#334155">↓ Consumer confidence → ↓C → AD shifts LEFT → price level falls (P1→P2), Real GDP falls (Y1→Y2).</text>
</svg>
