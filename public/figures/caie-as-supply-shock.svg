<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="Arial, sans-serif">
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .curve { stroke-width:2.5; fill:none; }
    .ad   { stroke:#1976d2; }
    .sras1{ stroke:#c62828; }
    .sras2{ stroke:#7f0000; }
    .lras { stroke:#2e7d32; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .arrow { stroke:#7f0000; stroke-width:2.2; fill:none; marker-end:url(#a); }
    .lbl   { font-size:14px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pt    { fill:#111; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f0000"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" class="ttl">2022 Global Energy Price Shock — SRAS Decrease</text>
  <text x="350" y="50" text-anchor="middle" class="sub">Geopolitical tensions raise energy costs for manufacturers and transport: SRAS1 → SRAS2</text>

  <line class="axis" x1="90"  y1="80"  x2="90"  y2="450"/>
  <line class="axis" x1="90"  y1="450" x2="640" y2="450"/>
  <text x="55"  y="80"  class="lblB">Price Level</text>
  <text x="610" y="475" class="lblB">Real GDP (Y)</text>

  <line class="curve lras" x1="470" y1="100" x2="470" y2="450"/>
  <text x="478" y="110" class="lbl" fill="#2e7d32">LRAS</text>

  <line class="curve ad" x1="130" y1="140" x2="610" y2="440"/>
  <text x="615" y="450" class="lbl" fill="#1976d2">AD</text>

  <line class="curve sras1" x1="140" y1="430" x2="620" y2="130"/>
  <text x="630" y="135" class="lbl" fill="#c62828">SRAS1</text>

  <line class="curve sras2" x1="90" y1="411" x2="530" y2="136"/>
  <text x="100" y="395" class="lbl" fill="#7f0000">SRAS2</text>

  <circle class="pt" cx="367" cy="288" r="4.5"/>
  <line class="dotted" x1="367" y1="288" x2="367" y2="450"/>
  <line class="dotted" x1="367" y1="288" x2="90"  y2="288"/>
  <text x="60"  y="293" class="lblB">P1</text>
  <text x="362" y="468" class="lblB">Y1</text>
  <text x="374" y="284" class="lbl">E1</text>

  <circle class="pt" cx="327" cy="263" r="4.5"/>
  <line class="dotted" x1="327" y1="263" x2="327" y2="450"/>
  <line class="dotted" x1="327" y1="263" x2="90"  y2="263"/>
  <text x="60"  y="268" class="lblB">P2</text>
  <text x="320" y="468" class="lblB">Y2</text>
  <text x="305" y="259" class="lbl">E2</text>

  <path class="arrow" d="M 360 350 q -50 -8 -90 -3"/>
  <text x="280" y="340" class="lbl" fill="#7f0000">SRAS shifts left</text>

  <text x="90"  y="495" class="sub">Higher energy prices force firms to require higher prices to maintain margins → SRAS shifts left.</text>
  <text x="90"  y="512" class="sub">Result: cost-push inflation (P↑) plus falling Real GDP (Y↓). UK CPI hit 11.1% in Oct 2022 from this kind of shock.</text>
</svg>
