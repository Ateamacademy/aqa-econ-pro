<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="omh" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="omv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
    <marker id="oml" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto"><polygon points="8,0 0,3 8,6" fill="#dc2626"/></marker>
    <marker id="omr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#dc2626"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">UK City Rent Max Price: Price Ceiling</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#omv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#omh)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Rent (£)</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Quantity of Rental Apartments</text>
  <!-- S (blue) -->
  <line x1="100" y1="400" x2="560" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="565" y="78" font-size="16" font-weight="bold" font-family="Arial" fill="#2563eb">S</text>
  <!-- D (red) -->
  <line x1="100" y1="100" x2="560" y2="400" stroke="#dc2626" stroke-width="3"/>
  <text x="565" y="405" font-size="16" font-weight="bold" font-family="Arial" fill="#dc2626">D</text>
  <!-- Equilibrium at ~(330, 250) -->
  <circle cx="330" cy="250" r="6" fill="#222"/>
  <line x1="80" y1="250" x2="330" y2="250" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="330" y1="250" x2="330" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="255" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P</text>
  <text x="330" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q</text>
  <!-- Pmax line at y=320 -->
  <line x1="80" y1="320" x2="620" y2="320" stroke="#dc2626" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="625" y="325" font-size="14" font-weight="bold" font-family="Arial" fill="#dc2626">Pₘₐₓ</text>
  <!-- Qs at ~(230, 320) on S -->
  <circle cx="230" cy="320" r="5" fill="#2563eb"/>
  <line x1="230" y1="320" x2="230" y2="430" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="230" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#2563eb">Qs</text>
  <!-- Qd at ~(430, 320) on D -->
  <circle cx="430" cy="320" r="5" fill="#dc2626"/>
  <line x1="430" y1="320" x2="430" y2="430" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="430" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#dc2626">Qd</text>
  <!-- Shortage arrow -->
  <line x1="230" y1="360" x2="430" y2="360" stroke="#dc2626" stroke-width="2.5" marker-start="url(#oml)" marker-end="url(#omr)"/>
  <text x="330" y="385" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#dc2626">SHORTAGE</text>
</svg>