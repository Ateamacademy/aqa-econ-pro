<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="480" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Import Quota · Country B Protects Domestic Wheat Farmers</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="540" y="420" font-size="12" fill="#0f172a">Quantity of Wheat</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price (£)</text>

  <!-- Domestic supply Sdom (upward) -->
  <line x1="130" y1="380" x2="540" y2="100" stroke="#0284c7" stroke-width="2.5"/>
  <text x="545" y="105" font-size="12" font-weight="600" fill="#0284c7">Sdom</text>

  <!-- Domestic demand Ddom (downward) -->
  <line x1="130" y1="100" x2="540" y2="380" stroke="#15803d" stroke-width="2.5"/>
  <text x="545" y="385" font-size="12" font-weight="600" fill="#15803d">Ddom</text>

  <!-- World price Pw (low horizontal line) -->
  <line x1="90" y1="320" x2="600" y2="320" stroke="#d97706" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="605" y="324" font-size="11" font-weight="700" fill="#d97706">Pw</text>
  <text x="68" y="324" font-size="11" font-weight="700" fill="#d97706">Pw</text>

  <!-- Pq (quota price, higher) -->
  <line x1="90" y1="260" x2="600" y2="260" stroke="#be123c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="605" y="264" font-size="11" font-weight="700" fill="#be123c">Pq</text>
  <text x="68" y="264" font-size="11" font-weight="700" fill="#be123c">Pq</text>

  <!-- Qs1 on Sdom at Pw: Sdom: y = 380 - 0.683(x-130); y=320 -> 60 = 0.683(x-130) -> x = 217.8 -->
  <circle cx="218" cy="320" r="4" fill="#0284c7"/>
  <line x1="218" y1="320" x2="218" y2="400" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="218" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0284c7">Qs1</text>

  <!-- Qd1 on Ddom at Pw: Ddom: y = 100 + 0.683(x-130); y=320 -> 220 = 0.683(x-130) -> x = 452 -->
  <circle cx="452" cy="320" r="4" fill="#15803d"/>
  <line x1="452" y1="320" x2="452" y2="400" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="452" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Qd1</text>

  <!-- Qs2 on Sdom at Pq: y=260 -> 120 = 0.683(x-130) -> x = 305.7 -->
  <circle cx="306" cy="260" r="4" fill="#be123c"/>
  <line x1="306" y1="260" x2="306" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="306" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Qs2</text>

  <!-- Qd2 on Ddom at Pq: y=260 -> 160 = 0.683(x-130) -> x = 364.2 -->
  <circle cx="364" cy="260" r="4" fill="#be123c"/>
  <line x1="364" y1="260" x2="364" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="364" y="445" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Qd2</text>

  <!-- Imports before quota: bracket from Qs1 to Qd1 at Pw -->
  <line x1="218" y1="335" x2="452" y2="335" stroke="#475569" stroke-width="1.8"/>
  <line x1="218" y1="330" x2="218" y2="340" stroke="#475569" stroke-width="1.8"/>
  <line x1="452" y1="330" x2="452" y2="340" stroke="#475569" stroke-width="1.8"/>
  <text x="335" y="352" text-anchor="middle" font-size="10" fill="#475569">Imports before quota</text>

  <!-- Quota volume: Qs2 to Qd2 at Pq -->
  <line x1="306" y1="245" x2="364" y2="245" stroke="#7c3aed" stroke-width="2.2"/>
  <line x1="306" y1="240" x2="306" y2="250" stroke="#7c3aed" stroke-width="2.2"/>
  <line x1="364" y1="240" x2="364" y2="250" stroke="#7c3aed" stroke-width="2.2"/>
  <text x="335" y="232" text-anchor="middle" font-size="10" font-weight="700" fill="#7c3aed">Quota</text>

  <!-- Producer surplus gain (trapezium between Sdom, Pw, Pq) -->
  <polygon points="90,320 218,320 306,260 90,260" fill="#bbf7d0" fill-opacity="0.6" stroke="#14532d" stroke-width="1"/>
  <text x="180" y="297" font-size="10" font-weight="700" fill="#14532d">↑ Producer</text>
  <text x="180" y="310" font-size="10" font-weight="700" fill="#14532d">surplus</text>

  <text x="310" y="465" text-anchor="middle" font-size="11" fill="#334155">Quota restricts imports → price ↑ (Pw→Pq), domestic supply ↑ (Qs1→Qs2), demand ↓ (Qd1→Qd2), producer surplus rises.</text>
</svg>
