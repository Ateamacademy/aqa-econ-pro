<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" font-family="Arial, sans-serif">
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .curve { stroke-width:2.5; fill:none; }
    .mpb { stroke:#1976d2; }
    .msb { stroke:#0d47a1; stroke-dasharray:2,2; }
    .msc { stroke:#c62828; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .dwl   { fill:#66bb6a; opacity:0.55; stroke:#1b5e20; stroke-width:1; }
    .lbl   { font-size:14px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pt    { fill:#111; }
  </style>

  <text x="350" y="28" text-anchor="middle" class="ttl">Positive Externality of Consumption · Smoking Cessation Services</text>
  <text x="350" y="48" text-anchor="middle" class="sub">External benefits (lower NHS costs, reduced second-hand smoke) make MSB &gt; MPB → market underconsumes</text>

  <line class="axis" x1="90"  y1="80"  x2="90"  y2="450"/>
  <line class="axis" x1="90"  y1="450" x2="640" y2="450"/>
  <text x="40"  y="80"  class="lblB">Price /</text>
  <text x="40"  y="98"  class="lblB">Benefit</text>
  <text x="555" y="475" class="lblB">Quantity</text>

  <!-- Welfare loss triangle: vertices at E1 (315,292), MSB at Q1 (315, 232), and E* (359, 259) -->
  <polygon class="dwl" points="315,292 315,232 359,259"/>

  <!-- MPB (private benefit, below MSB): y = 0.625x + 95; from (120,170) to (560,445) -->
  <line class="curve mpb" x1="120" y1="170" x2="560" y2="445"/>
  <text x="565" y="445" class="lbl" fill="#1976d2">MPB</text>

  <!-- MSB (social benefit, above MPB by external benefit): y = 0.625x + 35; from (120,110) to (560,385) -->
  <line class="curve msb" x1="120" y1="110" x2="560" y2="385"/>
  <text x="565" y="385" class="lbl" fill="#0d47a1">MSB</text>

  <!-- MSC = MPC (supply): y = -0.744x + 526.7; from (130,430) to (560,110) -->
  <line class="curve msc" x1="130" y1="430" x2="560" y2="110"/>
  <text x="565" y="110" class="lbl" fill="#c62828">MSC = MPC</text>

  <!-- Free market E1 = MPB ∩ MSC: x≈315, y≈292 -->
  <circle class="pt" cx="315" cy="292" r="4.5"/>
  <line class="dotted" x1="315" y1="292" x2="315" y2="450"/>
  <line class="dotted" x1="315" y1="292" x2="90"  y2="292"/>
  <text x="60"  y="297" class="lblB">P1</text>
  <text x="308" y="468" class="lblB">Q1</text>
  <text x="285" y="289" class="lbl">E1</text>

  <!-- Social optimum E* = MSB ∩ MSC: x≈359, y≈259 -->
  <circle class="pt" cx="359" cy="259" r="4.5"/>
  <line class="dotted" x1="359" y1="259" x2="359" y2="450"/>
  <line class="dotted" x1="359" y1="259" x2="90"  y2="259"/>
  <text x="60"  y="264" class="lblB">P*</text>
  <text x="354" y="468" class="lblB">Q*</text>
  <text x="365" y="255" class="lbl">E*</text>

  <!-- Welfare loss arrow -->
  <line class="dotted" x1="335" y1="265" x2="450" y2="220" stroke="#1b5e20"/>
  <text x="455" y="222" class="lbl" fill="#1b5e20">Welfare loss (DWL)</text>

  <text x="90"  y="495" class="sub">Free market sets MPB = MSC at Q1; the social optimum is at MSB = MSC at Q* &gt; Q1 → underconsumption.</text>
  <text x="90"  y="512" class="sub">Between Q1 and Q*, MSB &gt; MSC: each extra unit benefits society more than it costs society.</text>
  <text x="90"  y="529" class="sub">The shaded triangle is the deadweight welfare loss · the case for intervention (subsidy, public provision, info).</text>
</svg>
