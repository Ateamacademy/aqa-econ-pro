<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, Arial, sans-serif">
  <rect width="900" height="480" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Perfect Competition · UK Organic Kale SR to LR Adjustment</text>

  <text x="220" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Individual Firm</text>
  <text x="680" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Market</text>

  <!-- ============ FIRM PANEL ============ -->
  <line x1="70" y1="410" x2="410" y2="410" stroke="#0f172a" stroke-width="2"/>
  <line x1="70" y1="70" x2="70" y2="410" stroke="#0f172a" stroke-width="2"/>
  <text x="375" y="430" font-size="11" fill="#0f172a">q</text>
  <text x="45" y="65" font-size="11" fill="#0f172a">C/R</text>

  <!-- ATC (U-shape) minimum at (235, 240) -->
  <path d="M 100 150 C 160 230 200 240 235 240 C 290 240 340 250 400 260" fill="none" stroke="#d97706" stroke-width="2.3"/>
  <text x="405" y="262" font-size="11" font-weight="600" fill="#d97706">ATC</text>

  <!-- MC (U-shape) -->
  <path d="M 100 260 C 140 290 180 285 210 260 C 280 180 350 110 400 80" fill="none" stroke="#be123c" stroke-width="2.3"/>
  <text x="380" y="75" font-size="11" font-weight="600" fill="#be123c">MC</text>

  <!-- Short-run P1 line (SR abnormal profit) at y=190 -->
  <line x1="70" y1="190" x2="410" y2="190" stroke="#0284c7" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="415" y="194" font-size="10" font-weight="700" fill="#0284c7">P1 = AR = MR (SR)</text>

  <!-- LR P2 line at y=240 = min ATC -->
  <line x1="70" y1="240" x2="410" y2="240" stroke="#15803d" stroke-width="2"/>
  <text x="415" y="244" font-size="10" font-weight="700" fill="#15803d">P2 = AR = MR (LR)</text>

  <!-- q1 (SR MC=MR at P1): visually ~x=275 -->
  <circle cx="275" cy="190" r="4" fill="#0284c7"/>
  <line x1="275" y1="190" x2="275" y2="410" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="275" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#0284c7">q1</text>

  <!-- q2 (LR MC=MR at min ATC) at (235, 240) -->
  <circle cx="235" cy="240" r="4" fill="#15803d"/>
  <line x1="235" y1="240" x2="235" y2="410" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="235" y="440" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">q2</text>

  <!-- SR abnormal profit rectangle -->
  <rect x="70" y="190" width="205" height="53" fill="#fecaca" fill-opacity="0.6" stroke="#991b1b" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="172" y="222" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">Abnormal profit</text>
  <text x="172" y="235" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">(SR)</text>

  <!-- ============ MARKET PANEL ============ -->
  <line x1="520" y1="410" x2="870" y2="410" stroke="#0f172a" stroke-width="2"/>
  <line x1="520" y1="70" x2="520" y2="410" stroke="#0f172a" stroke-width="2"/>
  <text x="830" y="430" font-size="11" fill="#0f172a">Q</text>
  <text x="500" y="65" font-size="11" fill="#0f172a">P</text>

  <!-- D1 (initial) -->
  <line x1="540" y1="320" x2="800" y2="100" stroke="#0284c7" stroke-width="2.3" stroke-dasharray="5,3"/>
  <text x="775" y="112" font-size="11" font-weight="600" fill="#0284c7">D1</text>

  <!-- D2 (shifted right - health demand surge) -->
  <line x1="600" y1="320" x2="860" y2="100" stroke="#be123c" stroke-width="2.3"/>
  <text x="840" y="112" font-size="11" font-weight="600" fill="#be123c">D2</text>

  <!-- S1 (initial) -->
  <line x1="540" y1="370" x2="810" y2="100" stroke="#0369a1" stroke-width="2.3" stroke-dasharray="5,3"/>
  <text x="790" y="95" font-size="11" font-weight="600" fill="#0369a1">S1</text>

  <!-- S2 (shifted right - new firms enter) -->
  <line x1="600" y1="390" x2="870" y2="140" stroke="#0369a1" stroke-width="2.3"/>
  <text x="855" y="140" font-size="11" font-weight="600" fill="#0369a1">S2</text>

  <!-- E1: D1 ∩ S1 (initial) at visually (670, 200) -->
  <circle cx="670" cy="200" r="4" fill="#0284c7"/>
  <line x1="520" y1="200" x2="670" y2="200" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="500" y="204" text-anchor="end" font-size="10" font-weight="700" fill="#0284c7">Pe</text>

  <!-- SR E2: D2 ∩ S1 at visually (735, 150) -->
  <circle cx="735" cy="150" r="5" fill="#be123c"/>
  <line x1="520" y1="150" x2="735" y2="150" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="500" y="154" text-anchor="end" font-size="10" font-weight="700" fill="#be123c">P1</text>

  <!-- LR E3: D2 ∩ S2 at (765, 200) same as Pe -->
  <circle cx="765" cy="200" r="5" fill="#15803d"/>
  <text x="775" y="196" font-size="10" font-weight="700" fill="#15803d">P2 = Pe</text>

  <!-- Entry arrow -->
  <defs>
    <marker id="arrPC2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#334155"/></marker>
  </defs>
  <path d="M 625 260 L 705 280" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#arrPC2)"/>
  <text x="580" y="255" font-size="10" fill="#334155" font-style="italic">new firms enter →</text>
  <text x="580" y="268" font-size="10" fill="#334155" font-style="italic">supply shifts right</text>

  <text x="450" y="458" text-anchor="middle" font-size="11" fill="#334155">Demand surge → P↑ → abnormal profit → entry → supply shifts right → P returns to min ATC → normal profit (LR).</text>
</svg>
