<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="och" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="ocv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
    <marker id="oco" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#f97316"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">Demand-Side Shock: UK Consumer Confidence Rises</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#ocv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#och)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Price Level</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Real GDP (Y)</text>
  <!-- AS (blue) -->
  <line x1="100" y1="400" x2="560" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="565" y="78" font-size="16" font-weight="bold" font-family="Arial" fill="#2563eb">AS</text>
  <!-- AD1 (red) -->
  <line x1="100" y1="100" x2="440" y2="400" stroke="#dc2626" stroke-width="3"/>
  <text x="445" y="408" font-size="15" font-weight="bold" font-family="Arial" fill="#dc2626">AD₁</text>
  <!-- AD2 (orange, shifted right) -->
  <line x1="200" y1="100" x2="560" y2="420" stroke="#f97316" stroke-width="3"/>
  <text x="565" y="425" font-size="15" font-weight="bold" font-family="Arial" fill="#f97316">AD₂</text>
  <!-- E1 at ~(260, 248) -->
  <circle cx="260" cy="248" r="6" fill="#222"/>
  <line x1="80" y1="248" x2="260" y2="248" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="260" y1="248" x2="260" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="253" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₁</text>
  <text x="260" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Y₁</text>
  <!-- E2 at ~(360, 190) -->
  <circle cx="360" cy="190" r="6" fill="#222"/>
  <line x1="80" y1="190" x2="360" y2="190" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="360" y1="190" x2="360" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="195" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₂</text>
  <text x="360" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Y₂</text>
  <!-- Shift arrow -->
  <path d="M 270 200 Q 310 190 350 185" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#oco)"/>
  <text x="200" y="168" font-size="12" font-family="Arial" fill="#f97316">AD shifts right</text>
  <text x="200" y="183" font-size="12" font-family="Arial" fill="#f97316">(↑ Consumption)</text>
</svg>
