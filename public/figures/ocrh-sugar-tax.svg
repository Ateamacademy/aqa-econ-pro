<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="oth" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="otv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">UK Sugar Tax (SDIL): Indirect Tax on Fizzy Drinks</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#otv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#oth)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Price (£/L)</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Quantity of Sugary Drinks</text>
  <!-- D (red) -->
  <line x1="100" y1="100" x2="560" y2="400" stroke="#dc2626" stroke-width="3"/>
  <text x="565" y="405" font-size="16" font-weight="bold" font-family="Arial" fill="#dc2626">D</text>
  <!-- S (blue) -->
  <line x1="100" y1="400" x2="560" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="565" y="78" font-size="16" font-weight="bold" font-family="Arial" fill="#2563eb">S</text>
  <!-- S+tax (green, shifted up) -->
  <line x1="100" y1="320" x2="480" y2="60" stroke="#16a34a" stroke-width="3"/>
  <text x="485" y="55" font-size="14" font-weight="bold" font-family="Arial" fill="#16a34a">S + tax</text>
  <!-- Original equilibrium E at ~(330, 250) -->
  <circle cx="330" cy="250" r="6" fill="#222"/>
  <line x1="80" y1="250" x2="330" y2="250" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="330" y1="250" x2="330" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="255" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P</text>
  <text x="330" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q</text>
  <!-- New equilibrium E1 at ~(270, 195) -->
  <circle cx="270" cy="195" r="6" fill="#222"/>
  <line x1="80" y1="195" x2="270" y2="195" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="270" y1="195" x2="270" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="200" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₁</text>
  <text x="270" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q₁</text>
  <!-- Producer price Pp at ~(270, 280) on original S -->
  <circle cx="270" cy="280" r="4" fill="#16a34a"/>
  <line x1="80" y1="280" x2="270" y2="280" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="285" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#16a34a">Pₚ</text>
  <!-- Tax revenue rectangle -->
  <rect x="80" y="195" width="190" height="85" fill="#dc2626" fill-opacity="0.2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="175" y="240" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#dc2626">Tax Revenue</text>
  <!-- Annotation -->
  <text x="400" y="320" font-size="12" font-family="Arial" fill="#16a34a">S shifts up</text>
  <text x="400" y="335" font-size="12" font-family="Arial" fill="#16a34a">by tax per unit</text>
</svg>