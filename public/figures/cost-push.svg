<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Cost-Push Inflation · UK Energy Price Shock (2022–23)</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="545" y="420" font-size="12" fill="#0f172a">Real Output (Y)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price Level</text>

  <!-- LRAS vertical at YFE aligned with Equilibrium A (x=376) -->
  <line x1="376" y1="60" x2="376" y2="400" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="381" y="75" font-size="12" font-weight="700" fill="#7c3aed">LRAS</text>
  <text x="376" y="417" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">YFE</text>

  <!-- AD (downward) -->
  <line x1="130" y1="100" x2="560" y2="380" stroke="#0284c7" stroke-width="2.5"/>
  <text x="565" y="385" font-size="12" font-weight="600" fill="#0284c7">AD</text>

  <!-- SRAS1 (original) -->
  <line x1="200" y1="380" x2="580" y2="120" stroke="#be123c" stroke-width="2.5"/>
  <text x="585" y="125" font-size="12" font-weight="600" fill="#be123c">SRAS1</text>

  <!-- SRAS2 (shifted LEFT, parallel, ~70px left) -->
  <line x1="130" y1="360" x2="490" y2="100" stroke="#991b1b" stroke-width="2.5"/>
  <text x="493" y="95" font-size="12" font-weight="600" fill="#991b1b">SRAS2</text>

  <defs>
    <marker id="arrCP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#991b1b"/>
    </marker>
  </defs>
  <path d="M 430 180 L 360 155" fill="none" stroke="#991b1b" stroke-width="2" marker-end="url(#arrCP)"/>
  <text x="410" y="142" font-size="10" fill="#991b1b" font-style="italic">SRAS shifts LEFT</text>
  <text x="410" y="155" font-size="10" fill="#991b1b" font-style="italic">(↑ energy costs)</text>

  <!-- Equilibrium A at (376, 260) · sits on LRAS -->
  <circle cx="376" cy="260" r="6" fill="#be123c" stroke="#0f172a" stroke-width="1"/>
  <text x="386" y="256" font-size="13" font-weight="700" fill="#be123c">A</text>
  <line x1="90" y1="260" x2="376" y2="260" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="264" font-size="11" font-weight="700" fill="#be123c">P1</text>

  <!-- Equilibrium B at (319, 223) -->
  <circle cx="319" cy="223" r="6" fill="#991b1b" stroke="#0f172a" stroke-width="1"/>
  <text x="329" y="219" font-size="13" font-weight="700" fill="#991b1b">B</text>
  <line x1="90" y1="223" x2="319" y2="223" stroke="#991b1b" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="319" y1="223" x2="319" y2="400" stroke="#991b1b" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="227" font-size="11" font-weight="700" fill="#991b1b">P2</text>
  <text x="319" y="432" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Y2</text>

  <!-- Output falls arrow -->
  <path d="M 370 415 L 325 415" fill="none" stroke="#991b1b" stroke-width="2" marker-end="url(#arrCP)"/>

  <!-- Price rises arrow -->
  <path d="M 108 253 L 108 230" fill="none" stroke="#991b1b" stroke-width="2" marker-end="url(#arrCP)"/>

  <text x="310" y="450" text-anchor="middle" font-size="11" fill="#334155">↑energy costs → SRAS shifts LEFT → P rises (P1→P2) AND Y falls (YFE→Y2): stagflation.</text>
</svg>
