<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" font-family="Inter, system-ui, Arial, sans-serif" role="img" aria-labelledby="ibNegExtTitle ibNegExtDesc">
  <title id="ibNegExtTitle">Negative externality of consumption — high-sugar soft drinks</title>
  <desc id="ibNegExtDesc">MPC equals MSC slopes upward in red; MPB slopes downward in solid blue; MSB is parallel to MPB but lower and dashed. Market equilibrium Qm exceeds social optimum Qopt. The welfare-loss triangle between Qopt and Qm is shaded.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <pattern id="hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#5F5E5A" stroke-width="1.2" opacity="0.55"/>
    </pattern>
  </defs>

  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="500" fill="#1F1F1C">Negative externality of consumption — high-sugar soft drinks</text>
  <text x="380" y="58" text-anchor="middle" font-size="13" fill="#5F5E5A">Free market overconsumes; welfare loss is the shaded triangle</text>

  <!-- Axes -->
  <line x1="140" y1="540" x2="140" y2="90" stroke="#1F1F1C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="100" y1="500" x2="700" y2="500" stroke="#1F1F1C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="140" y="80" text-anchor="middle" font-size="13" fill="#1F1F1C">Price, costs, benefits</text>
  <text x="700" y="528" text-anchor="end" font-size="13" fill="#1F1F1C">Quantity of soft drinks</text>

  <!-- Welfare-loss triangle (drawn first so curves overlay) -->
  <polygon points="340,360 405,304 405,407" fill="url(#hatch)" stroke="#5F5E5A" stroke-width="0.8" stroke-opacity="0.65"/>

  <!-- MPC = MSC (red, upward) -->
  <line x1="190" y1="480" x2="630" y2="120" stroke="#A32D2D" stroke-width="2.6" stroke-linecap="round"/>
  <text x="636" y="116" font-size="12" font-weight="500" fill="#A32D2D">MPC = MSC = S</text>

  <!-- MSB (dashed blue, downward, below MPB) -->
  <line x1="150" y1="220" x2="490" y2="470" stroke="#185FA5" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="7 5"/>
  <text x="496" y="464" font-size="12" font-weight="500" fill="#185FA5">MSB</text>

  <!-- MPB (solid blue, downward) -->
  <line x1="150" y1="120" x2="640" y2="480" stroke="#185FA5" stroke-width="2.6" stroke-linecap="round"/>
  <text x="648" y="488" font-size="12" font-weight="500" fill="#185FA5">MPB = D</text>

  <!-- Italic caption near top of MPB -->
  <text x="158" y="138" font-size="11" font-style="italic" fill="#185FA5">Private benefit overstates social benefit</text>

  <!-- External cost (MEC) bracket: vertical double-headed arrow at x=220, y=186→286 -->
  <line x1="220" y1="186" x2="220" y2="286" stroke="#5F5E5A" stroke-width="1.1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="228" y="240" font-size="12" fill="#5F5E5A">External cost (MEC)</text>

  <!-- Market equilibrium (405, 304): MPB ∩ MPC -->
  <line x1="405" y1="500" x2="405" y2="304" stroke="#9A9A95" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="140" y1="304" x2="405" y2="304" stroke="#9A9A95" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="405" cy="304" r="4" fill="#1F1F1C"/>
  <text x="132" y="300" text-anchor="end" font-size="12" fill="#1F1F1C">P<tspan dy="3" font-size="10">m</tspan></text>
  <text x="405" y="520" text-anchor="middle" font-size="12" fill="#1F1F1C">Q<tspan dy="3" font-size="10">m</tspan></text>

  <!-- Social optimum (340, 360): MSB ∩ MSC -->
  <line x1="340" y1="500" x2="340" y2="360" stroke="#9A9A95" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="140" y1="360" x2="340" y2="360" stroke="#9A9A95" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="340" cy="360" r="4" fill="#1F1F1C"/>
  <text x="132" y="356" text-anchor="end" font-size="12" fill="#1F1F1C">P<tspan dy="3" font-size="10">opt</tspan></text>
  <text x="340" y="520" text-anchor="middle" font-size="12" fill="#1F1F1C">Q<tspan dy="3" font-size="10">opt</tspan></text>

  <!-- Welfare-loss callout -->
  <line x1="528" y1="272" x2="396" y2="346" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="532" y="266" font-size="12" font-weight="500" fill="#1F1F1C">Welfare loss</text>
  <text x="532" y="280" font-size="11" fill="#5F5E5A">(deadweight loss)</text>

  <text x="380" y="578" text-anchor="middle" font-size="11" fill="#5F5E5A">IB Economics HL/SL — market failure from negative externality of consumption</text>
</svg>
