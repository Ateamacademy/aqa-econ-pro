<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="480" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Negative Consumption Externality — High-Sugar Soft Drinks</text>

  <line x1="90" y1="410" x2="600" y2="410" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="410" stroke="#0f172a" stroke-width="2"/>
  <text x="555" y="430" font-size="12" fill="#0f172a">Output (Q)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Costs /</text>
  <text x="60" y="70" font-size="12" fill="#0f172a">Benefits</text>

  <!-- MPC = MSC (upward, yellow/gold like reference image) -->
  <line x1="130" y1="390" x2="540" y2="120" stroke="#ca8a04" stroke-width="2.6"/>
  <text x="545" y="125" font-size="11" font-weight="600" fill="#ca8a04">MPC = MSC</text>

  <!-- MPB (downward, green, original) -->
  <line x1="130" y1="130" x2="500" y2="390" stroke="#15803d" stroke-width="2.6"/>
  <text x="505" y="395" font-size="11" font-weight="600" fill="#15803d">MPB</text>

  <!-- MSB (downward, BELOW MPB by MEC, red) -->
  <line x1="130" y1="200" x2="460" y2="390" stroke="#be123c" stroke-width="2.6"/>
  <text x="465" y="395" font-size="11" font-weight="600" fill="#be123c">MSB</text>

  <!-- MEB/MEC gap (from MSB up to MPB) -->
  <defs>
    <marker id="arrMEBn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker>
    <marker id="arrMEBn2" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 z" fill="#7c3aed"/></marker>
  </defs>
  <line x1="420" y1="323" x2="420" y2="358" stroke="#7c3aed" stroke-width="1.5" marker-start="url(#arrMEBn2)" marker-end="url(#arrMEBn)"/>
  <text x="428" y="345" font-size="10" font-weight="700" fill="#7c3aed">MEC</text>

  <!-- Equilibria -->
  <!-- MPC: (130,390)→(540,120) slope -0.659, y=390-0.659(x-130)
       MPB: (130,130)→(500,390) slope 0.703, y=130+0.703(x-130)
       Qe (MPC=MPB): 390-0.659(x-130) = 130+0.703(x-130) -> 1.362(x-130)=260 -> x=320.9, y=264.5
  -->
  <circle cx="321" cy="264" r="5" fill="#15803d"/>
  <line x1="90" y1="264" x2="321" y2="264" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="321" y1="264" x2="321" y2="410" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="268" font-size="11" font-weight="700" fill="#15803d">Pe</text>
  <text x="321" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Qe</text>

  <!-- Qo: MSC=MSB
       MSB: (130,200)→(460,390) slope 190/330=0.576, y=200+0.576(x-130)
       390-0.659(x-130) = 200+0.576(x-130) -> 1.235(x-130)=190 -> x=283.8, y=289.4
  -->
  <circle cx="284" cy="289" r="5" fill="#be123c"/>
  <line x1="90" y1="289" x2="284" y2="289" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="284" y1="289" x2="284" y2="410" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="293" font-size="11" font-weight="700" fill="#be123c">Po</text>
  <text x="284" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Qo</text>

  <!-- Welfare loss triangle between Qo and Qe:
       B: on MPC at Qe (321, 264) — no, Qe already on MPC
       Actually the welfare-loss triangle is bounded by MPC above, MSB below, between Qo and Qe.
       Vertices: Qo on MSC=MPC at (284, 202)? Let me compute: MPC at x=284: y=390-0.659*(284-130)=390-101.5=288.5. So Qo-optimum is where MPC meets MSB — that's the point (284, 288.5) wait MSC=MPC so this IS at y=289.
       
       Qe on MPB at (321, 264)
       Point on MPC at Qe (321, 264) — this is the same point (since MPC=MPB at Qe on diagram)
       Point on MSB at Qe: y = 200 + 0.576*(321-130) = 200+110 = 310
       
       So welfare loss triangle: (284, 289) socialopt, (321, 264) marketeq, (321, 310) on MSB at Qe -->
  <polygon points="284,289 321,264 321,310" fill="#fecaca" fill-opacity="0.75" stroke="#991b1b" stroke-width="1.5"/>

  <!-- Welfare loss label -->
  <line x1="370" y1="300" x2="325" y2="288" stroke="#991b1b" stroke-width="1.3"/>
  <text x="375" y="298" font-size="11" font-weight="700" fill="#991b1b">Welfare Loss</text>
  <text x="375" y="312" font-size="10" fill="#991b1b">(ABC triangle)</text>

  <text x="310" y="465" text-anchor="middle" font-size="11" fill="#334155">MSB &lt; MPB (MEC). Market over-consumes (Qe &gt; Qo). Sugar tax can shift consumption toward social optimum Qo.</text>
</svg>
