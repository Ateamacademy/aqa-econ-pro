<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Natural Monopoly — UK Water Industry (Thames Water)</text>

  <!-- Axes -->
  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="555" y="420" font-size="12" fill="#0f172a">Output (Q)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Cost /</text>
  <text x="60" y="70" font-size="12" fill="#0f172a">Revenue (£)</text>

  <!-- Supernormal profit rectangle (shaded first) -->
  <rect x="90" y="170" width="140" height="50" fill="#bbf7d0" stroke="#15803d" stroke-width="1.5" stroke-dasharray="3,2" fill-opacity="0.6"/>

  <!-- D = AR -->
  <line x1="130" y1="100" x2="530" y2="380" stroke="#0284c7" stroke-width="2.5"/>
  <text x="535" y="385" font-size="12" font-weight="600" fill="#0284c7">D = AR</text>

  <!-- MR (steeper) -->
  <line x1="130" y1="128" x2="324" y2="400" stroke="#7c3aed" stroke-width="2.2"/>
  <text x="305" y="395" font-size="12" font-weight="600" fill="#7c3aed">MR</text>

  <!-- LRAC (falling, convex, economies of scale) -->
  <path d="M 130 140 C 200 210 300 235 540 250" fill="none" stroke="#d97706" stroke-width="2.5"/>
  <text x="545" y="252" font-size="12" font-weight="600" fill="#d97706">LRAC</text>

  <!-- MC (below LRAC throughout) -->
  <path d="M 130 290 C 200 280 220 275 230 268 C 300 240 420 190 540 150" fill="none" stroke="#be123c" stroke-width="2.5"/>
  <text x="545" y="153" font-size="12" font-weight="600" fill="#be123c">MC</text>

  <!-- Profit max point MC = MR at (230, 268) -->
  <circle cx="230" cy="268" r="5" fill="#0f172a"/>
  <text x="238" y="263" font-size="10" font-weight="700" fill="#0f172a">MC = MR</text>

  <!-- Vertical dashed line from Qm -->
  <line x1="230" y1="100" x2="230" y2="400" stroke="#475569" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="230" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Qm</text>

  <!-- Pm: on D at Qm (230, 170) -->
  <circle cx="230" cy="170" r="5" fill="#0284c7"/>
  <line x1="90" y1="170" x2="230" y2="170" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="174" font-size="11" font-weight="700" fill="#0284c7">Pm</text>

  <!-- LRAC at Qm (230, 220) -->
  <circle cx="230" cy="220" r="5" fill="#d97706"/>
  <line x1="90" y1="220" x2="230" y2="220" stroke="#d97706" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="48" y="224" font-size="10" font-weight="700" fill="#d97706">LRAC(Qm)</text>

  <!-- Supernormal profit label -->
  <text x="160" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">Supernormal</text>
  <text x="160" y="213" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">profit</text>

  <!-- EoS annotation arrow -->
  <defs>
    <marker id="arrEoS" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
  </defs>
  <path d="M 440 330 Q 460 290 475 260" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrEoS)"/>
  <text x="420" y="345" font-size="10" fill="#d97706" font-style="italic">falling LRAC = economies of scale</text>

  <!-- Conclusion -->
  <text x="310" y="445" text-anchor="middle" font-size="11" fill="#334155">High fixed infrastructure costs → single firm supplies market efficiently. Barriers to entry preserve profits (unlike PC).</text>
</svg>
