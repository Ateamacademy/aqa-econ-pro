<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, Arial, sans-serif">
  <rect width="900" height="480" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Perfect Competition — Short Run to Long Run (Wheat Market)</text>

  <text x="220" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Individual Firm</text>
  <text x="680" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Industry / Market</text>

  <!-- ============ FIRM PANEL ============ -->
  <line x1="70" y1="410" x2="410" y2="410" stroke="#0f172a" stroke-width="2"/>
  <line x1="70" y1="70" x2="70" y2="410" stroke="#0f172a" stroke-width="2"/>
  <text x="375" y="430" font-size="11" fill="#0f172a">q</text>
  <text x="45" y="65" font-size="11" fill="#0f172a">C/R</text>

  <!-- ATC (U-shape) - minimum at about (235, 240) -->
  <path d="M 100 150 C 160 230 200 240 235 240 C 290 240 340 250 400 260" fill="none" stroke="#d97706" stroke-width="2.3"/>
  <text x="405" y="262" font-size="11" font-weight="600" fill="#d97706">ATC</text>

  <!-- MC (U-shape, passes through ATC minimum at (235,240)) -->
  <path d="M 100 260 C 140 290 180 285 210 260 C 280 180 350 110 400 80" fill="none" stroke="#be123c" stroke-width="2.3"/>
  <text x="380" y="75" font-size="11" font-weight="600" fill="#be123c">MC</text>

  <!-- Short-run price line (higher) at y=190, horizontal = AR=MR -->
  <line x1="70" y1="190" x2="410" y2="190" stroke="#0284c7" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="415" y="194" font-size="10" font-weight="700" fill="#0284c7">P_SR = AR_SR = MR_SR</text>

  <!-- Long-run price line at y=240 = min ATC -->
  <line x1="70" y1="240" x2="410" y2="240" stroke="#15803d" stroke-width="2"/>
  <text x="415" y="244" font-size="10" font-weight="700" fill="#15803d">P_LR = min ATC</text>

  <!-- SR profit-max: where MC=MR_SR at y=190. MC curve at y=190: interpolate on MC curve; visually around x=275 -->
  <circle cx="275" cy="190" r="4" fill="#0284c7"/>
  <line x1="275" y1="190" x2="275" y2="410" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="275" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#0284c7">q_SR</text>

  <!-- LR profit-max: MC = P_LR at min ATC, at (235, 240) -->
  <circle cx="235" cy="240" r="4" fill="#15803d"/>
  <line x1="235" y1="240" x2="235" y2="410" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="235" y="440" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">q_LR</text>

  <!-- Supernormal profit rectangle at SR: from y=190 (P_SR) down to ATC at q_SR.
       ATC at x=275: approximate off the ATC curve - near the flat minimum around y=243 -->
  <rect x="70" y="190" width="205" height="53" fill="#bbf7d0" fill-opacity="0.6" stroke="#14532d" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="172" y="222" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">Supernormal</text>
  <text x="172" y="235" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">profit (SR)</text>

  <!-- ============ MARKET PANEL ============ -->
  <line x1="520" y1="410" x2="870" y2="410" stroke="#0f172a" stroke-width="2"/>
  <line x1="520" y1="70" x2="520" y2="410" stroke="#0f172a" stroke-width="2"/>
  <text x="830" y="430" font-size="11" fill="#0f172a">Q</text>
  <text x="500" y="65" font-size="11" fill="#0f172a">P</text>

  <!-- D1 (original demand) -->
  <line x1="540" y1="320" x2="800" y2="100" stroke="#0284c7" stroke-width="2.3" stroke-dasharray="5,3"/>
  <text x="775" y="110" font-size="11" font-weight="600" fill="#0284c7">D1</text>

  <!-- D2 (shifted right) -->
  <line x1="600" y1="320" x2="860" y2="100" stroke="#be123c" stroke-width="2.3"/>
  <text x="835" y="110" font-size="11" font-weight="600" fill="#be123c">D2</text>

  <!-- S1 (upward) -->
  <line x1="540" y1="370" x2="810" y2="100" stroke="#0369a1" stroke-width="2.3" stroke-dasharray="5,3"/>
  <text x="785" y="95" font-size="11" font-weight="600" fill="#0369a1">S1</text>

  <!-- S2 (shifted right after entry) -->
  <line x1="600" y1="390" x2="860" y2="140" stroke="#0369a1" stroke-width="2.3"/>
  <text x="845" y="140" font-size="11" font-weight="600" fill="#0369a1">S2</text>

  <!-- Equilibria:
       E1 (D1 ∩ S1): D1 slope (100-320)/(800-540) = -220/260 = -0.846; y=320-0.846(x-540)
                     S1 slope (100-370)/(810-540) = -270/270 = -1 (wait, S1 should be positive slope upward)
       Let me redo S1: (540, 370) to (810, 100) — that's upward sloping visually because higher x yields higher y value in axis terms... actually no, lower pixel y = higher price. So going from (540, 370) to (810, 100) means as x increases price increases = upward sloping supply. Slope in pixel terms = (100-370)/(810-540) = -1.0 (pixel). But represents positive economic slope.
       
       E1: 320 - 0.846(x-540) = 370 - 1.0(x-540) -> 0.154(x-540) = 50 -> x = 864.9 — way off right.
       Let me instead just place equilibria approximately: E1 at (660, 190); SR E2 at (720, 150); LR E3 at (700, 190).
  -->
  <!-- Initial E1 at (660, 190) -->
  <circle cx="660" cy="190" r="4" fill="#0284c7"/>
  <line x1="520" y1="190" x2="660" y2="190" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="500" y="194" text-anchor="end" font-size="10" font-weight="700" fill="#0284c7">Pe1</text>

  <!-- SR E2 (demand rises, D2 ∩ S1) at (730, 155) -->
  <circle cx="730" cy="155" r="5" fill="#be123c"/>
  <line x1="520" y1="155" x2="730" y2="155" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="500" y="159" text-anchor="end" font-size="10" font-weight="700" fill="#be123c">Pe2</text>

  <!-- LR E3 (after S shifts right, D2 ∩ S2) at (760, 190) -->
  <circle cx="760" cy="190" r="5" fill="#15803d"/>
  <text x="770" y="186" font-size="10" font-weight="700" fill="#15803d">Pe3 = Pe1</text>

  <!-- Entry arrow -->
  <defs>
    <marker id="arrPC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#334155"/></marker>
  </defs>
  <path d="M 620 260 L 700 280" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#arrPC)"/>
  <text x="575" y="255" font-size="10" fill="#334155" font-style="italic">new firms enter →</text>
  <text x="575" y="268" font-size="10" fill="#334155" font-style="italic">supply shifts right</text>

  <text x="450" y="458" text-anchor="middle" font-size="11" fill="#334155">SR: D↑ → P↑ → firms earn supernormal profit. Freedom of entry + perfect info → new firms enter → supply shifts right → P back to min ATC → NORMAL PROFIT in LR.</text>
</svg>
