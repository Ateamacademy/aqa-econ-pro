<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" font-family="Arial, sans-serif">
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .ar { stroke:#1976d2; stroke-width:2.5; fill:none; }
    .mc { stroke:#2e7d32; stroke-width:2.5; fill:none; }
    .ac { stroke:#212121; stroke-width:2.5; fill:none; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .profit { fill:#ef5350; opacity:0.5; stroke:#b71c1c; stroke-width:1; }
    .lbl   { font-size:13px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pt    { fill:#111; }
  </style>

  <text x="350" y="28" text-anchor="middle" class="ttl">Perfect Competition · Wheat Farmer Earning Short-Run Abnormal Profit</text>
  <text x="350" y="48" text-anchor="middle" class="sub">Price taker chooses output where MC = AR = MR; abnormal profit when AR &gt; ATC</text>

  <line class="axis" x1="100" y1="80"  x2="100" y2="450"/>
  <line class="axis" x1="100" y1="450" x2="640" y2="450"/>
  <text x="40"  y="80"  class="lblB">£</text>
  <text x="540" y="475" class="lblB">Output (q)</text>

  <!-- AC: clean U-shape with min around (385, 275) -->
  <path class="ac" d="M 130 180 C 220 350 320 290 385 275 C 460 250 540 295 600 195"/>
  <text x="605" y="195" class="lbl" fill="#212121">ATC</text>

  <!-- MC: U-shape that crosses AC at its min -->
  <path class="mc" d="M 130 360 C 180 410 240 370 280 320 C 340 270 385 280 385 275 C 410 260 480 200 540 130"/>
  <text x="545" y="130" class="lbl" fill="#2e7d32">MC</text>

  <!-- AR = MR = D = horizontal market price line at y=215 (above min ATC=275) -->
  <line class="ar" x1="100" y1="215" x2="640" y2="215"/>
  <text x="645" y="215" class="lbl" fill="#1976d2">AR=MR=D=P</text>

  <!-- Profit-max output where MC = AR (y=215). Read from MC curve: approx x=460 -->
  <circle class="pt" cx="460" cy="215" r="4.5"/>
  <line class="dotted" x1="460" y1="215" x2="460" y2="450"/>
  <text x="453" y="468" class="lblB">q*</text>

  <!-- AC at q*: ATC at x=460 ≈ y=251 -->
  <circle class="pt" cx="460" cy="251" r="4.5"/>
  <line class="dotted" x1="460" y1="251" x2="100" y2="251"/>
  <text x="65"  y="256" class="lbl">AC</text>

  <!-- Project P to axis -->
  <line class="dotted" x1="460" y1="215" x2="100" y2="215"/>
  <text x="65"  y="220" class="lblB">P</text>

  <!-- Abnormal profit rectangle: x[100, 460], y[215, 251] -->
  <rect class="profit" x="100" y="215" width="360" height="36"/>
  <text x="180" y="240" class="lblB" fill="#b71c1c">Abnormal profit (SR)</text>

  <text x="100" y="495" class="sub">Wheat is a homogeneous product in a perfectly competitive market · the farmer is a price taker (AR=MR is horizontal).</text>
  <text x="100" y="512" class="sub">Profit-max condition MC = MR gives output q*. At q*, AR &gt; ATC, so the farmer earns abnormal profit (red rectangle).</text>
  <text x="100" y="529" class="sub">Long run: no barriers to entry → new farmers enter, market supply shifts right, price falls until P = min ATC. Profit returns to normal.</text>
</svg>
