<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Subsidy on EV Components · Welsh Government</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="540" y="420" font-size="12" fill="#0f172a">Quantity of EVs</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price</text>

  <line x1="130" y1="100" x2="540" y2="380" stroke="#15803d" stroke-width="2.5"/>
  <text x="545" y="385" font-size="12" font-weight="600" fill="#15803d">D</text>

  <line x1="130" y1="380" x2="540" y2="100" stroke="#0284c7" stroke-width="2.4"/>
  <text x="545" y="95" font-size="11" font-weight="600" fill="#0284c7">S1</text>

  <line x1="130" y1="440" x2="540" y2="160" stroke="#be123c" stroke-width="2.4" stroke-dasharray="5,3"/>
  <text x="545" y="165" font-size="11" font-weight="600" fill="#be123c">S2</text>

  <defs>
    <marker id="arrWJS" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#be123c"/></marker>
  </defs>

  <circle cx="335" cy="240" r="5" fill="#0284c7"/>
  <line x1="90" y1="240" x2="335" y2="240" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="335" y1="240" x2="335" y2="400" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="244" font-size="11" font-weight="700" fill="#0284c7">PE</text>
  <text x="335" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0284c7">QE</text>

  <circle cx="379" cy="270" r="5" fill="#be123c"/>
  <line x1="90" y1="270" x2="379" y2="270" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="379" y1="270" x2="379" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="274" font-size="11" font-weight="700" fill="#be123c">P1</text>
  <text x="379" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Q1</text>

  <circle cx="379" cy="210" r="5" fill="#d97706"/>
  <line x1="90" y1="210" x2="379" y2="210" stroke="#d97706" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="214" font-size="11" font-weight="700" fill="#d97706">A</text>

  <rect x="90" y="210" width="289" height="30" fill="#bbf7d0" fill-opacity="0.65" stroke="#14532d" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="234" y="229" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">Producer Subsidy</text>

  <rect x="90" y="240" width="289" height="30" fill="#bfdbfe" fill-opacity="0.65" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="234" y="259" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Consumer Subsidy</text>

  <line x1="480" y1="210" x2="480" y2="270" stroke="#be123c" stroke-width="1.5" marker-end="url(#arrWJS)" marker-start="url(#arrWJS)"/>
  <text x="490" y="245" font-size="11" font-weight="700" fill="#be123c">Subsidy</text>

  <text x="310" y="455" text-anchor="middle" font-size="11" fill="#334155">Total government cost = (A − P1) × Q1. Subsidy internalises the positive externality of EV adoption.</text>
</svg>
