<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="oph" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="opv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">PED Elastic: Trend-UK Jeans (TR Falls)</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#opv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#oph)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Price (£)</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Quantity of Jeans</text>
  <!-- D elastic (red, flat) -->
  <line x1="100" y1="210" x2="600" y2="280" stroke="#dc2626" stroke-width="3"/>
  <text x="605" y="285" font-size="13" font-weight="bold" font-family="Arial" fill="#dc2626">D (elastic)</text>
  <!-- S1 (blue) -->
  <line x1="200" y1="400" x2="520" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="525" y="78" font-size="16" font-weight="bold" font-family="Arial" fill="#2563eb">S₁</text>
  <!-- S2 shifted left (green) -->
  <line x1="120" y1="400" x2="440" y2="80" stroke="#16a34a" stroke-width="3"/>
  <text x="420" y="70" font-size="16" font-weight="bold" font-family="Arial" fill="#16a34a">S₂</text>
  <!-- E1 at ~(400, 250) -->
  <circle cx="400" cy="250" r="6" fill="#222"/>
  <line x1="80" y1="250" x2="400" y2="250" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="400" y1="250" x2="400" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="255" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₁</text>
  <text x="400" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q₁</text>
  <!-- E2 at ~(290, 240) -->
  <circle cx="290" cy="237" r="6" fill="#222"/>
  <line x1="80" y1="237" x2="290" y2="237" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="290" y1="237" x2="290" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="232" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₂</text>
  <text x="290" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q₂</text>
  <!-- GAIN rectangle (small, horizontal strip) -->
  <rect x="80" y="237" width="210" height="13" fill="#16a34a" fill-opacity="0.4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="130" y="228" font-size="12" font-weight="bold" font-family="Arial" fill="#16a34a">GAIN</text>
  <!-- LOSS rectangle (large, vertical block) -->
  <rect x="290" y="250" width="110" height="180" fill="#dc2626" fill-opacity="0.25" stroke="#dc2626" stroke-width="1.5"/>
  <text x="320" y="350" font-size="16" font-weight="bold" font-family="Arial" fill="#dc2626">LOSS</text>
  <!-- Annotation box -->
  <rect x="460" y="100" width="130" height="50" rx="5" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="525" y="120" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial" fill="#dc2626">Loss > Gain</text>
  <text x="525" y="140" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial" fill="#dc2626">→ TR falls</text>
</svg>