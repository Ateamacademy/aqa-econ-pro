<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="700" height="500" fill="#fff"/>
  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Shift in Supply: Coffee Beans after Brazil Frost</text>
  <!-- Axes -->
  <line x1="80" y1="60" x2="80" y2="440" stroke="#1e293b" stroke-width="2.5"/>
  <line x1="80" y1="440" x2="650" y2="440" stroke="#1e293b" stroke-width="2.5"/>
  <text x="35" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b" transform="rotate(-90,35,250)">Price of Coffee</text>
  <text x="380" y="485" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Quantity of Roasted Coffee Beans</text>
  <!-- D -->
  <line x1="100" y1="90" x2="610" y2="420" stroke="#ef4444" stroke-width="3"/>
  <text x="615" y="430" font-size="15" font-weight="700" fill="#ef4444">D</text>
  <!-- S1 -->
  <line x1="120" y1="410" x2="600" y2="80" stroke="#3b82f6" stroke-width="3"/>
  <text x="605" y="75" font-size="15" font-weight="700" fill="#3b82f6">S₁</text>
  <!-- S2 shifted left -->
  <line x1="100" y1="320" x2="470" y2="70" stroke="#22c55e" stroke-width="3"/>
  <text x="440" y="60" font-size="15" font-weight="700" fill="#22c55e">S₂</text>
  <!-- E1 at approx (345, 245) -->
  <circle cx="345" cy="245" r="5" fill="#1e293b" stroke="#fff" stroke-width="1.5"/>
  <line x1="80" y1="245" x2="345" y2="245" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <line x1="345" y1="245" x2="345" y2="440" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <text x="60" y="250" text-anchor="end" font-size="14" fill="#1e293b">P₁</text>
  <text x="345" y="458" text-anchor="middle" font-size="14" fill="#1e293b">Q₁</text>
  <!-- E2 at approx (255, 185) -->
  <circle cx="255" cy="185" r="5" fill="#1e293b" stroke="#fff" stroke-width="1.5"/>
  <line x1="80" y1="185" x2="255" y2="185" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <line x1="255" y1="185" x2="255" y2="440" stroke="#94a3b8" stroke-dasharray="5,4" stroke-width="1.2"/>
  <text x="60" y="190" text-anchor="end" font-size="14" fill="#1e293b">P₂</text>
  <text x="255" y="458" text-anchor="middle" font-size="14" fill="#1e293b">Q₂</text>
  <!-- Shift arrow -->
  <defs><marker id="arrSL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/></marker></defs>
  <path d="M 380 290 Q 330 275 290 260" stroke="#22c55e" stroke-width="2.5" fill="none" marker-end="url(#arrSL)"/>
  <text x="270" y="340" font-size="13" fill="#22c55e" font-weight="600">Supply shifts left</text>
  <text x="270" y="358" font-size="12" fill="#22c55e">(higher costs)</text>
</svg>