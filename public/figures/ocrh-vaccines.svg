<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="ovh" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="ovv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">UK NHS Vaccinations: Positive Externality</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#ovv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#ovh)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Price / Benefit</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Quantity of Vaccinations</text>
  <!-- S = MPC = MSC (blue) -->
  <line x1="100" y1="400" x2="560" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="565" y="78" font-size="13" font-weight="bold" font-family="Arial" fill="#2563eb">S = MPC = MSC</text>
  <!-- D = MPB (red) -->
  <line x1="100" y1="100" x2="440" y2="400" stroke="#dc2626" stroke-width="3"/>
  <text x="445" y="408" font-size="13" font-weight="bold" font-family="Arial" fill="#dc2626">D = MPB</text>
  <!-- MSB (purple, right of MPB) -->
  <line x1="200" y1="100" x2="560" y2="420" stroke="#7c3aed" stroke-width="3"/>
  <text x="565" y="425" font-size="14" font-weight="bold" font-family="Arial" fill="#7c3aed">MSB</text>
  <!-- Market equilibrium Q1 at ~(260, 248) -->
  <circle cx="260" cy="248" r="6" fill="#222"/>
  <line x1="80" y1="248" x2="260" y2="248" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="260" y1="248" x2="260" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="253" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₁</text>
  <text x="260" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q₁</text>
  <!-- Social optimum Q2 at ~(360, 190) -->
  <circle cx="360" cy="190" r="6" fill="#222"/>
  <line x1="80" y1="190" x2="360" y2="190" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="360" y1="190" x2="360" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="195" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₂</text>
  <text x="360" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q₂</text>
  <!-- Welfare loss triangle -->
  <polygon points="260,248 260,170 360,190" fill="#ec4899" fill-opacity="0.35" stroke="#ec4899" stroke-width="1.5"/>
  <text x="275" y="215" font-size="13" font-weight="bold" font-family="Arial" fill="#ec4899">Welfare</text>
  <text x="280" y="231" font-size="13" font-weight="bold" font-family="Arial" fill="#ec4899">loss</text>
</svg>