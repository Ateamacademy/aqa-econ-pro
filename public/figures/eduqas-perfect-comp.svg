<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Arial, sans-serif">
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .d  { stroke:#1976d2; stroke-width:2.5; fill:none; }
    .s1 { stroke:#c62828; stroke-width:2.5; fill:none; }
    .s2 { stroke:#7f0000; stroke-width:2.5; fill:none; }
    .ar1 { stroke:#1976d2; stroke-width:2.2; fill:none; }
    .ar2 { stroke:#0d47a1; stroke-width:2.2; fill:none; stroke-dasharray:4,3; }
    .mc { stroke:#2e7d32; stroke-width:2.5; fill:none; }
    .ac { stroke:#212121; stroke-width:2.5; fill:none; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .arrow { stroke:#7f0000; stroke-width:2.2; fill:none; marker-end:url(#a2); }
    .profit { fill:#ef5350; opacity:0.5; stroke:#b71c1c; stroke-width:1; }
    .lbl   { font-size:13px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pnl   { font-size:14px; font-weight:700; fill:#333; }
    .pt    { fill:#111; }
  </style>
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f0000"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Perfect Competition · Short Run to Long Run</text>
  <text x="480" y="48" text-anchor="middle" class="sub">Strawberry market: supernormal profit attracts entry, market supply rises, price falls until only normal profit remains</text>

  <!-- LEFT PANEL: INDUSTRY -->
  <text x="240" y="78" text-anchor="middle" class="pnl">Industry / Market</text>
  <line class="axis" x1="80"  y1="100" x2="80"  y2="450"/>
  <line class="axis" x1="80"  y1="450" x2="430" y2="450"/>
  <text x="40"  y="100" class="lblB">Price</text>
  <text x="345" y="475" class="lblB">Quantity</text>

  <line class="d" x1="110" y1="140" x2="410" y2="430"/>
  <text x="415" y="430" class="lbl" fill="#1976d2">D</text>

  <line class="s1" x1="110" y1="430" x2="390" y2="140"/>
  <text x="395" y="140" class="lbl" fill="#c62828">S1</text>

  <line class="s2" x1="180" y1="430" x2="430" y2="171"/>
  <text x="412" y="155" class="lbl" fill="#7f0000">S2</text>

  <circle class="pt" cx="255" cy="280" r="4.5"/>
  <line class="dotted" x1="255" y1="280" x2="80"  y2="280"/>
  <line class="dotted" x1="255" y1="280" x2="255" y2="450"/>
  <text x="55"  y="285" class="lblB">P1</text>

  <circle class="pt" cx="291" cy="315" r="4.5"/>
  <line class="dotted" x1="291" y1="315" x2="80"  y2="315"/>
  <line class="dotted" x1="291" y1="315" x2="291" y2="450"/>
  <text x="55"  y="320" class="lblB">P2</text>

  <path class="arrow" d="M 195 380 q 35 -8 70 -3"/>
  <text x="195" y="397" class="lbl" fill="#7f0000">Entry → S right</text>

  <!-- RIGHT PANEL: FIRM -->
  <text x="700" y="78" text-anchor="middle" class="pnl">Representative Firm</text>
  <line class="axis" x1="500" y1="100" x2="500" y2="450"/>
  <line class="axis" x1="500" y1="450" x2="850" y2="450"/>
  <text x="465" y="100" class="lblB">£</text>
  <text x="780" y="475" class="lblB">Output (q)</text>

  <!-- AC: clean U-shape with min at (660, 315) -->
  <path class="ac" d="M 520 200 C 580 380 620 340 660 315 C 700 290 740 320 820 230"/>
  <text x="825" y="225" class="lbl" fill="#212121">AC</text>

  <!-- MC: U-shape that crosses AC at its minimum -->
  <path class="mc" d="M 520 380 C 560 410 600 380 640 350 C 660 330 660 318 660 315 C 680 290 740 200 800 110"/>
  <text x="805" y="110" class="lbl" fill="#2e7d32">MC</text>

  <line class="ar1" x1="500" y1="280" x2="850" y2="280"/>
  <text x="855" y="278" class="lbl" fill="#1976d2">AR1=MR1</text>

  <line class="ar2" x1="500" y1="315" x2="850" y2="315"/>
  <text x="855" y="320" class="lbl" fill="#0d47a1">AR2=MR2</text>

  <circle class="pt" cx="683" cy="280" r="4.5"/>
  <line class="dotted" x1="683" y1="280" x2="683" y2="450"/>
  <text x="673" y="468" class="lblB">q1</text>

  <circle class="pt" cx="683" cy="308" r="4.5"/>
  <line class="dotted" x1="683" y1="308" x2="500" y2="308"/>
  <text x="465" y="313" class="lbl">AC1</text>

  <rect class="profit" x="500" y="280" width="183" height="28"/>
  <text x="525" y="298" class="lblB" fill="#b71c1c">Supernormal profit (SR)</text>

  <circle class="pt" cx="660" cy="315" r="4.5"/>
  <line class="dotted" x1="660" y1="315" x2="660" y2="450"/>
  <text x="652" y="468" class="lblB">q2</text>

  <text x="80"  y="495" class="sub">Short run: market price P1 lies above the firm's AC at q1 → red rectangle = supernormal profit per period.</text>
  <text x="80"  y="512" class="sub">No barriers to entry: new firms enter, industry supply shifts S1 → S2, market price falls to P2.</text>
  <text x="80"  y="529" class="sub">Long-run equilibrium: P2 is tangential to the firm's minimum AC. Profit = normal only. Condition: P = MC = MR = AC.</text>
</svg>
