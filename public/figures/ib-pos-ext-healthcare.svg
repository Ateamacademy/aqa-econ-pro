<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="480" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Positive Consumption Externality · Preventive Healthcare</text>

  <line x1="90" y1="410" x2="600" y2="410" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="410" stroke="#0f172a" stroke-width="2"/>
  <text x="555" y="430" font-size="12" fill="#0f172a">Output (Q)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price (£)</text>

  <!-- MPC = MSC (upward, green) -->
  <line x1="130" y1="390" x2="540" y2="120" stroke="#15803d" stroke-width="2.6"/>
  <text x="545" y="125" font-size="11" font-weight="600" fill="#15803d">MPC = MSC</text>

  <!-- MPB (downward, orange/gold) -->
  <line x1="130" y1="180" x2="500" y2="390" stroke="#d97706" stroke-width="2.6"/>
  <text x="505" y="395" font-size="11" font-weight="600" fill="#d97706">MPB</text>

  <!-- MSB (ABOVE MPB by MEB, red) -->
  <line x1="130" y1="110" x2="560" y2="355" stroke="#be123c" stroke-width="2.6"/>
  <text x="565" y="360" font-size="11" font-weight="600" fill="#be123c">MSB</text>

  <!-- MEB gap -->
  <defs>
    <marker id="arrMEBp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker>
    <marker id="arrMEBp2" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 z" fill="#7c3aed"/></marker>
  </defs>
  <line x1="450" y1="285" x2="450" y2="318" stroke="#7c3aed" stroke-width="1.5" marker-start="url(#arrMEBp2)" marker-end="url(#arrMEBp)"/>
  <text x="458" y="307" font-size="10" font-weight="700" fill="#7c3aed">MEB</text>

  <!-- Qm at (301, 277); Qs at (358, 240) -->
  <circle cx="301" cy="277" r="5" fill="#d97706"/>
  <line x1="90" y1="277" x2="301" y2="277" stroke="#d97706" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="301" y1="277" x2="301" y2="410" stroke="#d97706" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="281" font-size="11" font-weight="700" fill="#d97706">Pm</text>
  <text x="301" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">Qm</text>

  <circle cx="358" cy="240" r="5" fill="#be123c"/>
  <line x1="90" y1="240" x2="358" y2="240" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="358" y1="240" x2="358" y2="410" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="244" font-size="11" font-weight="700" fill="#be123c">Ps</text>
  <text x="358" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Qs</text>

  <!-- Welfare loss/gain triangle -->
  <polygon points="301,277 301,208 358,240" fill="#bbf7d0" fill-opacity="0.7" stroke="#15803d" stroke-width="1.5"/>

  <line x1="400" y1="175" x2="335" y2="230" stroke="#15803d" stroke-width="1.3"/>
  <text x="405" y="173" font-size="11" font-weight="700" fill="#15803d">Welfare Loss</text>
  <text x="405" y="187" font-size="10" fill="#15803d">(under-consumption)</text>

  <text x="310" y="465" text-anchor="middle" font-size="11" fill="#334155">MSB &gt; MPB by MEB. Market under-consumes (Qm &lt; Qs). Subsidy or free provision corrects under-allocation.</text>
</svg>
