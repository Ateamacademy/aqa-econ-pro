<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Cost-Push Shock · Negative Output Gap (Stagflation)</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="545" y="420" font-size="12" fill="#0f172a">Real Output (Y)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price Level</text>

  <!-- LRAS vertical at Yf (x=376) -->
  <line x1="376" y1="60" x2="376" y2="400" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="381" y="75" font-size="12" font-weight="700" fill="#7c3aed">LRAS</text>
  <text x="376" y="417" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">Yf</text>

  <!-- AD -->
  <line x1="130" y1="100" x2="560" y2="380" stroke="#0284c7" stroke-width="2.5"/>
  <text x="565" y="385" font-size="12" font-weight="600" fill="#0284c7">AD</text>

  <!-- SRAS1 -->
  <line x1="200" y1="380" x2="580" y2="120" stroke="#be123c" stroke-width="2.5"/>
  <text x="585" y="125" font-size="12" font-weight="600" fill="#be123c">SRAS1</text>

  <!-- SRAS2 (shifted left/up) -->
  <line x1="130" y1="360" x2="490" y2="100" stroke="#991b1b" stroke-width="2.5"/>
  <text x="493" y="95" font-size="12" font-weight="600" fill="#991b1b">SRAS2</text>

  <defs>
    <marker id="arrIG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#991b1b"/></marker>
  </defs>
  <path d="M 430 180 L 360 155" fill="none" stroke="#991b1b" stroke-width="2" marker-end="url(#arrIG)"/>
  <text x="410" y="145" font-size="10" fill="#991b1b" font-style="italic">↑ energy costs</text>

  <!-- Initial eq at (376, 260) on LRAS -->
  <circle cx="376" cy="260" r="5" fill="#0f172a"/>
  <line x1="90" y1="260" x2="376" y2="260" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="264" font-size="11" font-weight="700" fill="#0f172a">P1</text>

  <!-- New eq at (319, 223) -->
  <circle cx="319" cy="223" r="5" fill="#991b1b"/>
  <line x1="90" y1="223" x2="319" y2="223" stroke="#991b1b" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="319" y1="223" x2="319" y2="400" stroke="#991b1b" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="227" font-size="11" font-weight="700" fill="#991b1b">P2</text>
  <text x="319" y="432" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Y1</text>

  <!-- Recessionary output gap bracket -->
  <line x1="319" y1="415" x2="376" y2="415" stroke="#a16207" stroke-width="2"/>
  <line x1="319" y1="410" x2="319" y2="420" stroke="#a16207" stroke-width="2"/>
  <line x1="376" y1="410" x2="376" y2="420" stroke="#a16207" stroke-width="2"/>
  <text x="347" y="455" text-anchor="middle" font-size="10" font-weight="700" fill="#a16207">Recessionary gap</text>

  <text x="310" y="465" text-anchor="middle" font-size="11" fill="#334155">Cost-push inflation: P rises (P1→P2) AND Y falls below Yf (Y1 &lt; Yf): stagflation with a recessionary output gap.</text>
</svg>
