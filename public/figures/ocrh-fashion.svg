<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="ofh" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="ofv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">UK Fast Fashion: Negative Production Externality</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#ofv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#ofh)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Price / Cost</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Quantity of Clothing</text>
  <!-- D = MPB = MSB (red) -->
  <line x1="100" y1="100" x2="560" y2="400" stroke="#dc2626" stroke-width="3"/>
  <text x="565" y="405" font-size="13" font-weight="bold" font-family="Arial" fill="#dc2626">D = MPB = MSB</text>
  <!-- S = MPC (blue) -->
  <line x1="100" y1="400" x2="560" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="565" y="78" font-size="13" font-weight="bold" font-family="Arial" fill="#2563eb">S = MPC</text>
  <!-- MSC (purple, above MPC) -->
  <line x1="100" y1="320" x2="480" y2="60" stroke="#7c3aed" stroke-width="3"/>
  <text x="485" y="55" font-size="14" font-weight="bold" font-family="Arial" fill="#7c3aed">MSC</text>
  <!-- Market equilibrium at ~(330, 250) -->
  <circle cx="330" cy="250" r="6" fill="#222"/>
  <line x1="80" y1="250" x2="330" y2="250" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="330" y1="250" x2="330" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="255" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₁</text>
  <text x="330" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q₁</text>
  <!-- Social optimum at ~(270, 195) -->
  <circle cx="270" cy="195" r="6" fill="#222"/>
  <line x1="80" y1="195" x2="270" y2="195" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="270" y1="195" x2="270" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="200" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P*</text>
  <text x="270" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q*</text>
  <!-- Welfare loss triangle -->
  <polygon points="270,195 330,250 330,175" fill="#ec4899" fill-opacity="0.35" stroke="#ec4899" stroke-width="1.5"/>
  <text x="340" y="210" font-size="13" font-weight="bold" font-family="Arial" fill="#ec4899">Welfare</text>
  <text x="340" y="226" font-size="13" font-weight="bold" font-family="Arial" fill="#ec4899">loss</text>
  <!-- MEC arrow -->
  <line x1="400" y1="200" x2="400" y2="140" stroke="#7c3aed" stroke-width="2" marker-end="url(#ofv)"/>
  <text x="410" y="175" font-size="12" font-family="Arial" fill="#7c3aed">MEC</text>
</svg>