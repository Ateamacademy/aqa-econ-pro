<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="480" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Oligopoly — Kinked Demand Curve</text>

  <line x1="80" y1="420" x2="590" y2="420" stroke="#0f172a" stroke-width="2"/>
  <line x1="80" y1="50" x2="80" y2="420" stroke="#0f172a" stroke-width="2"/>
  <text x="530" y="445" font-size="12" fill="#0f172a">Output (Q)</text>
  <text x="30" y="55" font-size="11" fill="#0f172a">Price /</text>
  <text x="30" y="70" font-size="11" fill="#0f172a">Cost &amp;</text>
  <text x="30" y="85" font-size="11" fill="#0f172a">Revenue</text>
  <text x="85" y="445" font-size="12" fill="#0f172a">O</text>

  <!-- AR (D) kinked: elastic above, inelastic below kink at (300, 210) -->
  <!-- Elastic portion (steeper, green-blue) -->
  <line x1="120" y1="70" x2="300" y2="210" stroke="#0284c7" stroke-width="2.8"/>
  <!-- Inelastic portion (flatter, blue) -->
  <line x1="300" y1="210" x2="560" y2="380" stroke="#0284c7" stroke-width="2.8"/>
  <text x="565" y="385" font-size="12" font-weight="600" fill="#0284c7">AR (D)</text>

  <!-- Labels for elastic/inelastic sections -->
  <text x="160" y="110" font-size="11" font-weight="600" fill="#15803d">Elastic (PED &gt; 1)</text>
  <text x="400" y="310" font-size="11" font-weight="600" fill="#0284c7">Inelastic</text>
  <text x="400" y="325" font-size="11" font-weight="600" fill="#0284c7">(PED &lt; 1)</text>

  <!-- MR: two sections with vertical gap -->
  <!-- Upper MR (steeper, from top-left to gap) -->
  <line x1="120" y1="100" x2="300" y2="320" stroke="#15803d" stroke-width="2.5"/>
  <!-- Lower MR (from gap to bottom-right) -->
  <line x1="300" y1="370" x2="480" y2="420" stroke="#15803d" stroke-width="2.5"/>
  <text x="485" y="418" font-size="12" font-weight="600" fill="#15803d">MR</text>

  <!-- Vertical MR gap -->
  <line x1="300" y1="320" x2="300" y2="370" stroke="#15803d" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="260" y="350" font-size="10" font-weight="700" fill="#15803d">gap</text>

  <!-- MC1 (horizontal, through gap, brown/orange) -->
  <line x1="130" y1="335" x2="560" y2="335" stroke="#d97706" stroke-width="2.3"/>
  <text x="565" y="340" font-size="11" font-weight="600" fill="#d97706">MC₁</text>

  <!-- MC2 (horizontal, also through gap, dashed red) -->
  <line x1="130" y1="355" x2="560" y2="355" stroke="#be123c" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="565" y="360" font-size="11" font-weight="600" fill="#be123c">MC₂</text>

  <!-- Kink point E -->
  <circle cx="300" cy="210" r="6" fill="#0284c7"/>
  <text x="312" y="200" font-size="13" font-weight="700" fill="#0f172a">E</text>

  <!-- P0 dashed to kink -->
  <line x1="80" y1="210" x2="300" y2="210" stroke="#64748b" stroke-dasharray="4,3" stroke-width="1.2"/>
  <text x="60" y="215" font-size="12" font-weight="700" fill="#0f172a">P₀</text>

  <!-- Q0 dashed down -->
  <line x1="300" y1="210" x2="300" y2="420" stroke="#64748b" stroke-dasharray="4,3" stroke-width="1.2"/>
  <text x="300" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Q₀</text>

  <!-- MC1 and MC2 dots on gap -->
  <circle cx="300" cy="335" r="4" fill="#d97706"/>
  <circle cx="300" cy="355" r="4" fill="#be123c"/>

  <!-- Annotation box -->
  <rect x="370" y="80" width="210" height="60" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="100" font-size="10" font-weight="600" fill="#334155">MC can shift between MC₁ and MC₂</text>
  <text x="380" y="115" font-size="10" font-weight="600" fill="#334155">without changing P₀ or Q₀ → price</text>
  <text x="380" y="130" font-size="10" font-weight="600" fill="#334155">rigidity in oligopoly markets.</text>
</svg>