<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" font-family="Inter, Arial, sans-serif">
  <rect width="560" height="400" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Figure 1 — The market for coffee</text>

  <line x1="80" y1="340" x2="520" y2="340" stroke="#0f172a" stroke-width="2"/>
  <line x1="80" y1="60" x2="80" y2="340" stroke="#0f172a" stroke-width="2"/>
  <text x="470" y="360" font-size="12" fill="#0f172a">Quantity of coffee (Q)</text>
  <text x="50" y="55" font-size="12" fill="#0f172a">Price ($)</text>

  <line x1="120" y1="100" x2="500" y2="320" stroke="#0284c7" stroke-width="2.5"/>
  <text x="505" y="100" font-size="12" font-weight="600" fill="#0284c7">S</text>

  <line x1="120" y1="320" x2="500" y2="100" stroke="#be123c" stroke-width="2.5"/>
