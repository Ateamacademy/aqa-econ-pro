  <circle cx="310" cy="210" r="5" fill="#0f172a"/>
  <line x1="80" y1="210" x2="310" y2="210" stroke="#0f172a" stroke-dasharray="4,4" stroke-width="1.2"/>
  <line x1="310" y1="210" x2="310" y2="340" stroke="#0f172a" stroke-dasharray="4,4" stroke-width="1.2"/>
  <text x="58" y="214" font-size="12" font-weight="700" fill="#0f172a">P</text>
  <text x="310" y="358" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Q</text>
  <text x="318" y="206" font-size="11" fill="#0f172a">E</text>
