<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="Arial, sans-serif">
  <style>
    .axis { stroke:#111; stroke-width:2; fill:none; }
    .curve { stroke-width:2.5; fill:none; }
    .d  { stroke:#1976d2; }
    .s1 { stroke:#c62828; }
    .s2 { stroke:#7f0000; }
    .dotted { stroke:#444; stroke-width:1.4; stroke-dasharray:5,4; fill:none; }
    .arrow { stroke:#7f0000; stroke-width:2.2; fill:none; marker-end:url(#a); }
    .lbl   { font-size:14px; fill:#111; }
    .lblB  { font-size:14px; fill:#111; font-weight:700; }
    .ttl   { font-size:18px; font-weight:700; fill:#111; }
    .sub   { font-size:12px; fill:#444; }
    .pt    { fill:#111; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f0000"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" class="ttl">Global Coffee Market — Decrease in Supply</text>
  <text x="350" y="50" text-anchor="middle" class="sub">Brazilian crop failure + 15% rise in fertiliser costs shift Supply left (S1 → S2)</text>

  <!-- Axes -->
  <line class="axis" x1="90"  y1="80"  x2="90"  y2="450"/>
  <line class="axis" x1="90"  y1="450" x2="640" y2="450"/>
  <text x="60"  y="80"  class="lblB">Price (£)</text>
  <text x="650" y="455" class="lblB">Quantity of Coffee</text>

  <line class="curve d" x1="120" y1="130" x2="600" y2="430"/>
  <text x="610" y="430" class="lbl" fill="#1976d2">D</text>

  <!-- S1: (130,430) to (600,130) -->
  <line class="curve s1" x1="130" y1="430" x2="600" y2="130"/>
  <text x="610" y="130" class="lbl" fill="#c62828">S1</text>

  <line class="curve s2" x1="90" y1="411" x2="530" y2="130"/>
  <text x="540" y="130" class="lbl" fill="#7f0000">S2</text>

  <circle class="pt" cx="363" cy="282" r="4.5"/>
  <line class="dotted" x1="363" y1="282" x2="363" y2="450"/>
  <line class="dotted" x1="363" y1="282" x2="90"  y2="282"/>
  <text x="68"  y="287" class="lblB">P1</text>
  <text x="357" y="468" class="lblB">Q1</text>
  <text x="370" y="278" class="lbl">E1</text>

  <circle class="pt" cx="327" cy="259" r="4.5"/>
  <line class="dotted" x1="327" y1="259" x2="327" y2="450"/>
  <line class="dotted" x1="327" y1="259" x2="90"  y2="259"/>
  <text x="68"  y="264" class="lblB">P2</text>
  <text x="320" y="468" class="lblB">Q2</text>
  <text x="334" y="255" class="lbl">E2</text>

  <!-- Shift arrow showing leftward shift -->
  <path class="arrow" d="M 360 360 q -45 -10 -85 -5"/>
  <text x="290" y="378" class="lbl" fill="#7f0000">S shifts left</text>

  <!-- Caption -->
  <text x="90"  y="495" class="sub">Crop failure cuts productive capacity; higher fertiliser costs raise marginal cost of production.</text>
  <text x="90"  y="512" class="sub">Less is supplied at every price → S1 → S2 → equilibrium moves from (P1,Q1) to (P2,Q2): P↑ and Q↓.</text>
</svg>
