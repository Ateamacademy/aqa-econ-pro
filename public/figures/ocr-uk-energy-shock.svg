<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="ouh" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="ouv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
    <marker id="oug" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#16a34a"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">Supply-Side Shock: UK 2022 Energy Crisis</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#ouv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#ouh)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Price Level</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Real GDP (Y)</text>
  <!-- AD (red) -->
  <line x1="120" y1="100" x2="560" y2="400" stroke="#dc2626" stroke-width="3"/>
  <text x="565" y="405" font-size="16" font-weight="bold" font-family="Arial" fill="#dc2626">AD</text>
  <!-- SRAS1 (blue) -->
  <line x1="100" y1="400" x2="560" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="565" y="78" font-size="14" font-weight="bold" font-family="Arial" fill="#2563eb">SRAS₁</text>
  <!-- SRAS2 (green, shifted left) -->
  <line x1="80" y1="320" x2="460" y2="60" stroke="#16a34a" stroke-width="3"/>
  <text x="465" y="58" font-size="14" font-weight="bold" font-family="Arial" fill="#16a34a">SRAS₂</text>
  <!-- E1 at ~(350, 240) -->
  <circle cx="350" cy="240" r="6" fill="#222"/>
  <line x1="80" y1="240" x2="350" y2="240" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="350" y1="240" x2="350" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="245" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₁</text>
  <text x="350" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Y₁</text>
  <!-- E2 at ~(280, 185) -->
  <circle cx="280" cy="185" r="6" fill="#222"/>
  <line x1="80" y1="185" x2="280" y2="185" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="280" y1="185" x2="280" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="190" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₂</text>
  <text x="280" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Y₂</text>
  <!-- Shift arrow -->
  <path d="M 370 290 Q 330 270 290 250" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#oug)"/>
  <text x="140" y="110" font-size="12" font-family="Arial" fill="#16a34a">SRAS shifts left</text>
  <text x="140" y="125" font-size="12" font-family="Arial" fill="#16a34a">(↑ energy costs)</text>
</svg>
