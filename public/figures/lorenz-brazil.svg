<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 500" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="500" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Lorenz Curve · UK vs Brazil Income Inequality</text>

  <!-- Axes -->
  <line x1="100" y1="400" x2="540" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="100" y1="60" x2="100" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="320" y="440" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Cumulative % of population</text>
  <text x="50" y="230" font-size="12" font-weight="600" fill="#0f172a" transform="rotate(-90 50 230)">Cumulative % of income</text>

  <!-- Ticks x -->
  <g font-size="10" fill="#475569">
    <text x="100" y="416" text-anchor="middle">0</text>
    <text x="200" y="416" text-anchor="middle">25</text>
    <text x="300" y="416" text-anchor="middle">50</text>
    <text x="400" y="416" text-anchor="middle">75</text>
    <text x="500" y="416" text-anchor="middle">100</text>
  </g>
  <g font-size="10" fill="#475569">
    <text x="92" y="404" text-anchor="end">0</text>
    <text x="92" y="315" text-anchor="end">25</text>
    <text x="92" y="230" text-anchor="end">50</text>
    <text x="92" y="145" text-anchor="end">75</text>
    <text x="92" y="64" text-anchor="end">100</text>
  </g>

  <!-- Shaded area A between 45° line and Brazil curve -->
  <path d="M 100 400 L 500 60 C 460 170 420 290 340 360 C 290 390 200 400 100 400 Z"
        fill="#fecaca" fill-opacity="0.55"/>

  <!-- 45° line of perfect equality -->
  <line x1="100" y1="400" x2="500" y2="60" stroke="#15803d" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="440" y="78" font-size="11" font-weight="700" fill="#15803d">Line of perfect equality (45°)</text>

  <!-- UK Lorenz curve (closer to 45°) -->
  <path d="M 100 400 C 180 400 250 360 310 320 C 380 260 440 155 500 60"
        fill="none" stroke="#0284c7" stroke-width="2.8"/>
  <text x="325" y="300" font-size="11" font-weight="700" fill="#0284c7">UK (G ≈ 0.35)</text>

  <!-- Brazil Lorenz curve (further from 45°) -->
  <path d="M 100 400 C 200 400 290 390 340 360 C 420 290 460 170 500 60"
        fill="none" stroke="#be123c" stroke-width="3"/>
  <text x="360" y="385" font-size="11" font-weight="700" fill="#be123c">Brazil (G ≈ 0.49)</text>

  <!-- Label area A (between 45° and Brazil curve) -->
  <text x="260" y="220" font-size="14" font-weight="700" fill="#7f1d1d">A</text>

  <!-- Label area B (below Brazil curve) -->
  <text x="380" y="395" font-size="14" font-weight="700" fill="#1e3a8a">B</text>

  <!-- Gini formula box -->
  <rect x="130" y="75" width="180" height="65" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="220" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Gini Coefficient</text>
  <text x="220" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">G = A / (A + B)</text>
  <text x="220" y="131" text-anchor="middle" font-size="10" fill="#475569">higher A → higher G → more unequal</text>

  <!-- Annotation arrow: Brazil further from line -->
  <defs>
    <marker id="arrLz2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
  </defs>
  <path d="M 280 180 Q 320 250 350 335" fill="none" stroke="#0f172a" stroke-width="1.4" marker-end="url(#arrLz2)"/>
  <text x="170" y="170" font-size="10" fill="#0f172a">greater distance from 45° line</text>
  <text x="170" y="184" font-size="10" fill="#0f172a">= more income inequality</text>

  <text x="310" y="480" text-anchor="middle" font-size="11" fill="#334155">Brazil's curve bows further below 45° than UK's → larger area A → higher Gini → more unequal distribution.</text>
</svg>
