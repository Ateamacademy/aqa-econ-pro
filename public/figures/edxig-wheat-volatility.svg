<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="eh" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="ev2" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">Price Volatility: Global Wheat Crisis 2022</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#ev2)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#eh)"/>
  <text x="40" y="240" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Price of Wheat ($/tonne)</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Quantity of Wheat</text>
  <!-- Steep D (inelastic, red) -->
  <line x1="300" y1="80" x2="400" y2="410" stroke="#dc2626" stroke-width="3"/>
  <text x="410" y="415" font-size="14" font-weight="bold" font-family="Arial" fill="#dc2626">D (inelastic)</text>
  <!-- Steep S1 (blue) -->
  <line x1="340" y1="410" x2="430" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="435" y="78" font-size="16" font-weight="bold" font-family="Arial" fill="#2563eb">S₁</text>
  <!-- Steep S2 (green, shifted left) -->
  <line x1="280" y1="410" x2="370" y2="80" stroke="#16a34a" stroke-width="3"/>
  <text x="345" y="68" font-size="16" font-weight="bold" font-family="Arial" fill="#16a34a">S₂</text>
  <!-- E1 at ~(370, 260) -->
  <circle cx="370" cy="260" r="6" fill="#222"/>
  <line x1="80" y1="260" x2="370" y2="260" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="370" y1="260" x2="370" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="265" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P</text>
  <text x="370" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q</text>
  <!-- E2 at ~(335, 150) -->
  <circle cx="335" cy="150" r="6" fill="#222"/>
  <line x1="80" y1="150" x2="335" y2="150" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="335" y1="150" x2="335" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="155" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₁</text>
  <text x="335" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q₁</text>
  <!-- Annotation -->
  <text x="110" y="150" font-size="14" font-weight="bold" font-family="Arial" fill="#16a34a">Small Δ in Q,</text>
  <text x="110" y="170" font-size="14" font-weight="bold" font-family="Arial" fill="#16a34a">LARGE Δ in P</text>
</svg>