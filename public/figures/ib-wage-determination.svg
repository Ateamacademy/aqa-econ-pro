<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">UK Hospitality Labour Market · Worker Shortage Shifts S_L Left</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="515" y="420" font-size="12" fill="#0f172a">Employment (L)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Wage (W)</text>

  <!-- D_L (MRPL, downward) -->
  <line x1="130" y1="110" x2="540" y2="380" stroke="#15803d" stroke-width="2.5"/>
  <text x="545" y="385" font-size="12" font-weight="600" fill="#15803d">D_L = MRPL</text>

  <!-- S_L1 (original, upward): (130,380) → (490,110) -->
  <line x1="130" y1="380" x2="490" y2="110" stroke="#0284c7" stroke-width="2.4"/>
  <text x="490" y="100" font-size="11" font-weight="600" fill="#0284c7">S_L1</text>

  <!-- S_L2 (shifted LEFT · parallel shift up): same slope, shifted so at given L the wage is higher.
       Endpoints: (130, 300) → (410, 90), then visually this sits ABOVE and to the LEFT of S_L1 -->
  <line x1="130" y1="300" x2="410" y2="90" stroke="#be123c" stroke-width="2.4" stroke-dasharray="5,3"/>
  <text x="410" y="85" font-size="11" font-weight="600" fill="#be123c">S_L2</text>

  <!-- Shift arrow -->
  <defs>
    <marker id="arrL" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#be123c"/></marker>
  </defs>
  <path d="M 310 260 L 250 220" fill="none" stroke="#be123c" stroke-width="2" marker-end="url(#arrL)"/>
  <text x="320" y="275" font-size="10" fill="#be123c" font-style="italic">↓ workers</text>
  <text x="320" y="288" font-size="10" fill="#be123c" font-style="italic">(migration policy)</text>

  <!-- Equilibria:
       D_L: (130,110)→(540,380) slope 270/410=0.659, y=110+0.659(x-130)
       S_L1: (130,380)→(490,110) slope -270/360=-0.75, y=380-0.75(x-130)
       E1: 110+0.659(x-130)=380-0.75(x-130) -> 1.409(x-130)=270 -> x=321.6, y=236
       
       S_L2: (130,300)→(410,90) slope -210/280=-0.75, y=300-0.75(x-130)
       E2: 110+0.659(x-130)=300-0.75(x-130) -> 1.409(x-130)=190 -> x=264.8, y=199
  -->

  <!-- E1 at (322, 236) -->
  <circle cx="322" cy="236" r="5" fill="#0284c7"/>
  <line x1="90" y1="236" x2="322" y2="236" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="322" y1="236" x2="322" y2="400" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="240" font-size="11" font-weight="700" fill="#0284c7">We1</text>
  <text x="322" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0284c7">Le1</text>

  <!-- E2 at (265, 199) -->
  <circle cx="265" cy="199" r="5" fill="#be123c"/>
  <line x1="90" y1="199" x2="265" y2="199" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="265" y1="199" x2="265" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="203" font-size="11" font-weight="700" fill="#be123c">We2</text>
  <text x="265" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Le2</text>

  <text x="310" y="455" text-anchor="middle" font-size="11" fill="#334155">↓ supply of workers → S_L shifts left → wage ↑ (We1→We2) but employment ↓ (Le1→Le2).</text>
</svg>
