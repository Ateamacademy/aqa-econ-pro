<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Monopoly Abnormal Profit — UK Water Companies</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="555" y="420" font-size="12" fill="#0f172a">Output (Q)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price /</text>
  <text x="60" y="70" font-size="12" fill="#0f172a">Cost (£)</text>

  <!-- Abnormal profit rectangle (drawn first so curves overlay) -->
  <rect x="90" y="170" width="140" height="50" fill="#bbf7d0" stroke="#15803d" stroke-width="1.5" stroke-dasharray="3,2" fill-opacity="0.6"/>

  <!-- D = AR (downward) -->
  <line x1="130" y1="100" x2="530" y2="380" stroke="#0284c7" stroke-width="2.5"/>
  <text x="535" y="385" font-size="12" font-weight="600" fill="#0284c7">D = AR</text>

  <!-- MR (steeper, double slope) -->
  <line x1="130" y1="128" x2="324" y2="400" stroke="#7c3aed" stroke-width="2.3"/>
  <text x="305" y="395" font-size="12" font-weight="600" fill="#7c3aed">MR</text>

  <!-- ATC (U-shape) -->
  <path d="M 130 140 C 200 220 270 265 320 265 C 400 255 470 240 540 230" fill="none" stroke="#d97706" stroke-width="2.5"/>
  <text x="545" y="232" font-size="12" font-weight="600" fill="#d97706">ATC</text>

  <!-- MC (U-shape) passing through MC=MR at (230, 268) -->
  <path d="M 130 240 C 170 290 205 290 230 268 C 280 235 370 130 520 50" fill="none" stroke="#be123c" stroke-width="2.5"/>
  <text x="510" y="48" font-size="12" font-weight="600" fill="#be123c">MC</text>

  <!-- MC=MR point -->
  <circle cx="230" cy="268" r="5" fill="#0f172a"/>
  <text x="238" y="263" font-size="10" font-weight="700" fill="#0f172a">MC = MR</text>

  <!-- Vertical dashed line from Qm -->
  <line x1="230" y1="100" x2="230" y2="400" stroke="#475569" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="230" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Qm</text>

  <!-- Pm on D at Qm (230, 170) -->
  <circle cx="230" cy="170" r="5" fill="#0284c7"/>
  <line x1="90" y1="170" x2="230" y2="170" stroke="#0284c7" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="174" font-size="11" font-weight="700" fill="#0284c7">Pm</text>

  <!-- ATC at Qm (230, 220) -->
  <circle cx="230" cy="220" r="5" fill="#d97706"/>
  <line x1="90" y1="220" x2="230" y2="220" stroke="#d97706" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="48" y="224" font-size="10" font-weight="700" fill="#d97706">ATC(Qm)</text>

  <!-- Abnormal profit labels -->
  <text x="160" y="197" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">Abnormal</text>
  <text x="160" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">profit</text>

  <!-- AR > ATC annotation bracket -->
  <defs>
    <marker id="arrAbn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="arrAbn2" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 z" fill="#15803d"/></marker>
  </defs>
  <line x1="260" y1="170" x2="260" y2="220" stroke="#15803d" stroke-width="1.5" marker-start="url(#arrAbn2)" marker-end="url(#arrAbn)"/>
  <text x="268" y="200" font-size="11" font-weight="700" fill="#15803d">AR − ATC</text>

  <text x="310" y="445" text-anchor="middle" font-size="11" fill="#334155">Profit-max at MC=MR → Qm, Pm. AR > ATC at Qm → abnormal profit. Sunk costs + infrastructure → long-run persistence.</text>
</svg>
