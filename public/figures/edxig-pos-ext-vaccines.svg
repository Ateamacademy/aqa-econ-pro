<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="ch" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="cv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">Positive Externality: UK Childhood Vaccinations</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#cv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#ch)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Price / Benefit</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Quantity of Vaccinations</text>
  <!-- S = MPC = MSC (blue) -->
  <line x1="100" y1="400" x2="560" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="565" y="78" font-size="13" font-weight="bold" font-family="Arial" fill="#2563eb">S = MPC = MSC</text>
  <!-- D = MPB (red) -->
  <line x1="100" y1="100" x2="480" y2="400" stroke="#dc2626" stroke-width="3"/>
  <text x="485" y="408" font-size="14" font-weight="bold" font-family="Arial" fill="#dc2626">D = MPB</text>
  <!-- MSB (purple, parallel above D) -->
  <line x1="200" y1="100" x2="560" y2="380" stroke="#7c3aed" stroke-width="3"/>
  <text x="565" y="385" font-size="14" font-weight="bold" font-family="Arial" fill="#7c3aed">MSB</text>
  <!-- MSB = MPB + ext benefit annotation -->
  <text x="150" y="78" font-size="12" font-family="Arial" fill="#7c3aed">MSB = MPB + external benefit</text>
  <!-- Market eq Qm at D∩S: approx (275, 238) -->
  <circle cx="275" cy="238" r="6" fill="#222"/>
  <line x1="80" y1="238" x2="275" y2="238" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="275" y1="238" x2="275" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="243" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Pₘ</text>
  <text x="275" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Qₘ</text>
  <!-- Social opt Q* at MSB∩S: approx (370, 182) -->
  <circle cx="370" cy="182" r="6" fill="#222"/>
  <line x1="80" y1="182" x2="370" y2="182" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="370" y1="182" x2="370" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="187" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P*</text>
  <text x="370" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q*</text>
  <!-- Welfare loss triangle -->
  <polygon points="275,238 370,182 275,152" fill="#ec4899" fill-opacity="0.35" stroke="#ec4899" stroke-width="1.5"/>
  <text x="290" y="205" font-size="12" font-weight="bold" font-family="Arial" fill="#ec4899">Welfare</text>
  <text x="295" y="220" font-size="12" font-weight="bold" font-family="Arial" fill="#ec4899">loss</text>
</svg>