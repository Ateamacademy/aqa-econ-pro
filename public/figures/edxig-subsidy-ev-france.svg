<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#fff"/>
  <defs>
    <marker id="bh" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#222"/></marker>
    <marker id="bv" markerWidth="6" markerHeight="8" refX="3" refY="1" orient="auto"><polygon points="0,8 3,0 6,8" fill="#222"/></marker>
    <marker id="bg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#16a34a"/></marker>
  </defs>
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" font-family="Arial" fill="#222">Subsidy: French EV Market</text>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="2.5" marker-end="url(#bv)"/>
  <line x1="80" y1="430" x2="640" y2="430" stroke="#222" stroke-width="2.5" marker-end="url(#bh)"/>
  <text x="40" y="240" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222" transform="rotate(-90,40,240)">Price of EV (€)</text>
  <text x="400" y="470" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#222">Quantity of Electric Vehicles</text>
  <!-- D (red) -->
  <line x1="100" y1="100" x2="580" y2="400" stroke="#dc2626" stroke-width="3"/>
  <text x="585" y="405" font-size="16" font-weight="bold" font-family="Arial" fill="#dc2626">D</text>
  <!-- S1 (blue) -->
  <line x1="100" y1="400" x2="580" y2="80" stroke="#2563eb" stroke-width="3"/>
  <text x="585" y="78" font-size="16" font-weight="bold" font-family="Arial" fill="#2563eb">S₁</text>
  <!-- S2 (green, shifted right) -->
  <line x1="180" y1="430" x2="620" y2="130" stroke="#16a34a" stroke-width="3"/>
  <text x="625" y="130" font-size="16" font-weight="bold" font-family="Arial" fill="#16a34a">S₂</text>
  <!-- E1 at ~(340, 240) -->
  <circle cx="340" cy="240" r="6" fill="#222"/>
  <line x1="80" y1="240" x2="340" y2="240" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="340" y1="240" x2="340" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="244" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₁</text>
  <text x="340" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q₁</text>
  <!-- E2 at ~(410, 285) -->
  <circle cx="410" cy="285" r="6" fill="#222"/>
  <line x1="80" y1="285" x2="410" y2="285" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="410" y1="285" x2="410" y2="430" stroke="#999" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="62" y="290" text-anchor="end" font-size="14" font-weight="bold" font-family="Arial" fill="#222">P₂</text>
  <text x="410" y="450" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#222">Q₂</text>
  <!-- Shift arrow -->
  <path d="M 320 180 Q 380 220 430 230" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#bg)"/>
  <text x="310" y="155" font-size="13" font-family="Arial" fill="#16a34a">Supply shifts right</text>
  <text x="310" y="172" font-size="13" font-family="Arial" fill="#16a34a">( ↓ unit cost)</text>
</svg>