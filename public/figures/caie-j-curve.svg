<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="480" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Marshall-Lerner Condition — J-Curve Effect</text>

  <line x1="80" y1="420" x2="590" y2="420" stroke="#0f172a" stroke-width="2"/>
  <line x1="80" y1="50" x2="80" y2="420" stroke="#0f172a" stroke-width="2"/>
  <text x="555" y="445" font-size="12" fill="#0f172a">Time</text>
  <text x="25" y="180" font-size="11" fill="#0f172a" transform="rotate(-90, 25, 240)">Current Account Balance</text>
  <text x="85" y="445" font-size="12" fill="#0f172a">O</text>

  <!-- Zero line -->
  <line x1="80" y1="240" x2="590" y2="240" stroke="#64748b" stroke-dasharray="5,3" stroke-width="1.2"/>
  <text x="590" y="235" font-size="10" fill="#64748b">0</text>

  <!-- Labels -->
  <text x="90" y="190" font-size="11" font-weight="600" fill="#15803d">Surplus (+)</text>
  <text x="90" y="290" font-size="11" font-weight="600" fill="#be123c">Deficit (−)</text>

  <!-- Depreciation vertical dashed line -->
  <line x1="180" y1="55" x2="180" y2="420" stroke="#d97706" stroke-dasharray="5,3" stroke-width="1.5"/>
  <text x="180" y="48" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">Depreciation</text>

  <!-- J-Curve path -->
  <!-- Initial deficit at D0, then worsens, then improves past zero to surplus -->
  <path d="M 100 220 L 180 220 C 220 220 260 310 320 340 C 360 355 380 350 400 330 C 440 290 470 240 500 190 C 520 160 540 145 560 140"
        fill="none" stroke="#0284c7" stroke-width="3" stroke-linecap="round"/>

  <!-- D0 initial point -->
  <circle cx="180" cy="220" r="5" fill="#0284c7"/>
  <text x="160" y="210" font-size="11" font-weight="700" fill="#0284c7">D₀</text>

  <!-- Worst point -->
  <circle cx="340" cy="348" r="5" fill="#be123c"/>
  <text x="350" y="370" font-size="11" font-weight="700" fill="#be123c">Worst point</text>

  <!-- Long run point -->
  <circle cx="540" cy="148" r="5" fill="#15803d"/>
  <text x="470" y="130" font-size="11" font-weight="700" fill="#15803d">Long run</text>
  <text x="470" y="145" font-size="10" font-weight="600" fill="#15803d">M-L condition met</text>

  <!-- Improving arrow -->
  <defs>
    <marker id="arrJC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#15803d"/></marker>
  </defs>
  <path d="M 420 280 L 450 250" fill="none" stroke="#15803d" stroke-width="1.5" marker-end="url(#arrJC)"/>
  <text x="430" y="295" font-size="10" font-weight="600" fill="#15803d">improving</text>

  <!-- Short run label -->
  <text x="230" y="400" font-size="11" font-weight="700" fill="#be123c">Short run</text>
  <text x="215" y="415" font-size="10" font-weight="600" fill="#be123c">PEDx + PEDm &lt; 1</text>
</svg>