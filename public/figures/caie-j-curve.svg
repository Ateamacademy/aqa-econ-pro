<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">J-Curve &amp; Marshall-Lerner Condition · Currency Depreciation</text>

  <!-- Axes: x-axis at y=240 (zero line); y-axis at x=90 -->
  <line x1="90" y1="240" x2="600" y2="240" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="410" stroke="#0f172a" stroke-width="2"/>
  <text x="560" y="258" font-size="12" fill="#0f172a">Time</text>
  <text x="60" y="60" font-size="12" fill="#0f172a">Trade</text>
  <text x="60" y="74" font-size="12" fill="#0f172a">balance</text>

  <text x="98" y="78" font-size="11" font-weight="700" fill="#15803d">Surplus (+)</text>
  <text x="98" y="400" font-size="11" font-weight="700" fill="#be123c">Deficit (−)</text>
  <text x="82" y="244" text-anchor="end" font-size="11" font-weight="700" fill="#0f172a">0</text>

  <!-- Initial trade balance (below zero - deficit) at y=270 from x=90 to x=200 -->
  <line x1="90" y1="270" x2="200" y2="270" stroke="#0284c7" stroke-width="2.8"/>
  <text x="145" y="262" text-anchor="middle" font-size="10" font-weight="700" fill="#0284c7">Initial deficit</text>

  <!-- Depreciation event vertical dashed line at x=200 -->
  <line x1="200" y1="70" x2="200" y2="400" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5,4"/>
  <text x="205" y="82" font-size="11" font-weight="700" fill="#7c3aed">Depreciation</text>
  <text x="205" y="95" font-size="10" fill="#7c3aed">(currency falls)</text>

  <!-- J-curve path -->
  <!-- Flat at y=270 until x=200 (drawn above)
       Dip: down to trough around (270, 360)
       Rise: through zero around (380, 240) 
       Final: up to above starting level at (570, 180) -->
  <path d="M 200 270 C 225 300 245 350 275 358 C 325 350 370 270 420 220 C 480 180 540 175 580 173"
        fill="none" stroke="#0284c7" stroke-width="3"/>

  <!-- Short-run trough marker -->
  <circle cx="275" cy="358" r="6" fill="#be123c"/>
  <line x1="90" y1="358" x2="275" y2="358" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="275" y1="358" x2="275" y2="240" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="282" y="362" font-size="10" font-weight="700" fill="#be123c">Short-run trough</text>
  <text x="282" y="375" font-size="10" fill="#be123c">(deeper deficit)</text>

  <!-- Long-run improvement marker -->
  <circle cx="570" cy="173" r="6" fill="#15803d"/>
  <line x1="90" y1="173" x2="570" y2="173" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="430" y="164" font-size="10" font-weight="700" fill="#15803d">Long-run improvement (surplus)</text>

  <!-- Starting level reference dashed line extended -->
  <line x1="200" y1="270" x2="600" y2="270" stroke="#0284c7" stroke-width="1" stroke-dasharray="2,3" opacity="0.5"/>

  <!-- Phase labels along time axis -->
  <text x="235" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#be123c">Short run</text>
  <text x="235" y="440" text-anchor="middle" font-size="9" fill="#334155">PEDx + PEDm &lt; 1</text>

  <text x="480" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">Long run</text>
  <text x="480" y="440" text-anchor="middle" font-size="9" fill="#334155">PEDx + PEDm &gt; 1</text>

  <!-- Marshall-Lerner condition box -->
  <rect x="330" y="85" width="260" height="70" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1"/>
  <text x="460" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Marshall-Lerner Condition</text>
  <text x="460" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">PEDx + PEDm &gt; 1</text>
  <text x="460" y="140" text-anchor="middle" font-size="9" fill="#334155">→ depreciation improves the</text>
  <text x="460" y="151" text-anchor="middle" font-size="9" fill="#334155">current account in the long run</text>

  <text x="310" y="460" text-anchor="middle" font-size="11" fill="#334155">SR: inelastic volumes → deficit worsens (dip). LR: volumes adjust → exports ↑, imports ↓ → current account improves.</text>
</svg>
