<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="480" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Specific Indirect Tax — French Sugar-Sweetened Beverages</text>

  <!-- Axes -->
  <line x1="90" y1="410" x2="610" y2="410" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="410" stroke="#0f172a" stroke-width="2"/>
  <text x="555" y="430" font-size="12" fill="#0f172a">Quantity</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Price (£)</text>

  <!-- Demand D: from (130, 110) to (560, 390), slope 0.651
       y = 110 + 0.651(x-130) -->
  <line x1="130" y1="110" x2="560" y2="390" stroke="#0284c7" stroke-width="2.5"/>
  <text x="565" y="395" font-size="12" font-weight="600" fill="#0284c7">D</text>

  <!-- Original Supply S: from (130, 400) to (520, 110), slope -0.744
       y = 400 - 0.744(x-130) -->
  <line x1="130" y1="400" x2="520" y2="110" stroke="#0284c7" stroke-width="2.5"/>
  <text x="525" y="115" font-size="12" font-weight="600" fill="#0284c7">S</text>

  <!-- S1 = S + Tax (shifted vertically up by, say, 80 pixels, parallel)
       S1: from (130, 320) to (520, 30). Endpoints need to stay within canvas - let me shift by 70 instead
       S1: from (130, 330) to (520, 40) -->
  <line x1="130" y1="330" x2="520" y2="40" stroke="#15803d" stroke-width="2.5"/>
  <text x="525" y="45" font-size="12" font-weight="700" fill="#15803d">S1 = S + Tax</text>

  <!-- Compute equilibria:
       S slope = (110-400)/(520-130) = -290/390 = -0.744; y = 400 - 0.744(x-130)
       D slope = (390-110)/(560-130) = 280/430 = 0.651; y = 110 + 0.651(x-130)
       S1 slope same as S, shifted up by 70: y = 330 - 0.744(x-130)
       
       Initial eq (S=D): 400 - 0.744(x-130) = 110 + 0.651(x-130)
         1.395(x-130) = 290 -> x-130 = 207.9 -> x=337.9, y = 110 + 0.651*207.9 = 110+135.4 = 245.3
       QE = 337.9, PE pixel y = 245 (=PE)
       
       New eq (S1=D): 330 - 0.744(x-130) = 110 + 0.651(x-130)
         1.395(x-130) = 220 -> x-130 = 157.7 -> x = 287.7, y = 110 + 0.651*157.7 = 110 + 102.7 = 212.7
       Q1 = 287.7, P1 pixel y = 213 (= P1, higher on screen)
       
       Producer net price A (on original S at Q1): y = 400 - 0.744*(287.7-130) = 400 - 117.3 = 282.7
       A pixel y = 283
       
       Tax per unit = P1 - A = 283 - 213 = 70 pixels (matches the 70px shift).
  -->

  <!-- Initial equilibrium point (Y dot on S at QE, PE) -->
  <circle cx="338" cy="245" r="5" fill="#0f172a"/>

  <!-- New equilibrium: W on D at Q1, P1 -->
  <circle cx="288" cy="213" r="5" fill="#be123c"/>
  <text x="293" y="208" font-size="12" font-weight="700" fill="#0f172a">W</text>

  <!-- Y: on S at Q1 and PE level: actually Y in reference is on D at PE (intersection with horizontal PE at Q1)? 
       Per reference image: W at top of tax on S1/D, Y at middle (PE horizontal and Q1), Z at bottom (on original S at Q1)
       So:
       W = (Q1, P1) on S1 AND D
       Y = (Q1, PE)
       Z = (Q1, A) on original S at Q1 — equals A position horizontally at x=Q1 -->
  
  <!-- Y point at (Q1, PE) = (288, 245) -->
  <circle cx="288" cy="245" r="5" fill="#0f172a"/>
  <text x="293" y="240" font-size="12" font-weight="700" fill="#0f172a">Y</text>

  <!-- Z point at (Q1, A) = (288, 283) -->
  <circle cx="288" cy="283" r="5" fill="#0f172a"/>
  <text x="293" y="299" font-size="12" font-weight="700" fill="#0f172a">Z</text>

  <!-- Horizontal dashed lines for P1, PE, A -->
  <line x1="90" y1="213" x2="288" y2="213" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="217" text-anchor="end" font-size="11" font-weight="700" fill="#be123c">P1</text>

  <line x1="90" y1="245" x2="338" y2="245" stroke="#0f172a" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="249" text-anchor="end" font-size="11" font-weight="700" fill="#0f172a">PE</text>

  <line x1="90" y1="283" x2="288" y2="283" stroke="#d97706" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="287" text-anchor="end" font-size="11" font-weight="700" fill="#d97706">A</text>

  <!-- Vertical dashed lines for Q1 and QE -->
  <line x1="288" y1="213" x2="288" y2="410" stroke="#475569" stroke-dasharray="3,3" stroke-width="1"/>
  <line x1="338" y1="245" x2="338" y2="410" stroke="#475569" stroke-dasharray="3,3" stroke-width="1"/>
  <text x="288" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Q1</text>
  <text x="338" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">QE</text>

  <!-- Consumer Tax rectangle: W-Y box between P1 (213) and PE (245), x 90 to 288 -->
  <rect x="90" y="213" width="198" height="32" fill="#bfdbfe" fill-opacity="0.65" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="189" y="233" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Consumer Burden</text>

  <!-- Producer Tax rectangle: Y-Z box between PE (245) and A (283), x 90 to 288 -->
  <rect x="90" y="245" width="198" height="38" fill="#fef3c7" fill-opacity="0.75" stroke="#a16207" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="189" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">Producer Burden</text>

  <!-- Tax per unit bracket on right side of Q1 -->
  <defs>
    <marker id="arrTx" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#15803d"/></marker>
    <marker id="arrTxE" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 z" fill="#15803d"/></marker>
  </defs>
  <line x1="395" y1="213" x2="395" y2="283" stroke="#15803d" stroke-width="1.5" marker-start="url(#arrTxE)" marker-end="url(#arrTx)"/>
  <text x="403" y="251" font-size="11" font-weight="700" fill="#15803d">Tax</text>
  <text x="403" y="264" font-size="10" fill="#15803d">per unit</text>

  <!-- Government revenue total = consumer + producer rectangle combined (90 to 288, 213 to 283) — no additional shading but labelled via conclusion -->

  <text x="320" y="455" text-anchor="middle" font-size="11" fill="#334155">Tax shifts S → S1. Eq moves to (P1, Q1). Consumer burden = (P1−PE)×Q1; Producer burden = (PE−A)×Q1. Gov revenue = tax × Q1. PED &lt; PES → consumers bear more.</text>
</svg>
