<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="Inter, Arial, sans-serif">
  <rect width="620" height="470" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">UK Hospitality Labour Market · Tourism Recovery Raises Labour Demand</text>

  <line x1="90" y1="400" x2="600" y2="400" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="400" stroke="#0f172a" stroke-width="2"/>
  <text x="515" y="420" font-size="12" fill="#0f172a">Employment (L)</text>
  <text x="60" y="55" font-size="12" fill="#0f172a">Wage (W)</text>

  <!-- S_L (upward) -->
  <line x1="130" y1="380" x2="540" y2="110" stroke="#0284c7" stroke-width="2.5"/>
  <text x="545" y="105" font-size="12" font-weight="600" fill="#0284c7">S_L</text>

  <!-- D_L1 (original, downward) -->
  <line x1="130" y1="110" x2="490" y2="380" stroke="#15803d" stroke-width="2.4"/>
  <text x="490" y="395" font-size="11" font-weight="600" fill="#15803d">D_L1</text>

  <!-- D_L2 (shifted RIGHT) -->
  <line x1="220" y1="110" x2="580" y2="380" stroke="#be123c" stroke-width="2.4" stroke-dasharray="5,3"/>
  <text x="585" y="395" font-size="11" font-weight="600" fill="#be123c">D_L2</text>

  <defs>
    <marker id="arrWJ6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#be123c"/></marker>
  </defs>
  <path d="M 230 220 L 310 220" fill="none" stroke="#be123c" stroke-width="2" marker-end="url(#arrWJ6)"/>
  <text x="270" y="210" text-anchor="middle" font-size="10" fill="#be123c" font-style="italic">↑ derived demand (tourism ↑)</text>

  <!-- E1 at (318, 251) -->
  <circle cx="318" cy="251" r="5" fill="#15803d"/>
  <line x1="90" y1="251" x2="318" y2="251" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="318" y1="251" x2="318" y2="400" stroke="#15803d" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="255" font-size="11" font-weight="700" fill="#15803d">We1</text>
  <text x="318" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Le1</text>

  <!-- E2 at (366, 219) -->
  <circle cx="366" cy="219" r="5" fill="#be123c"/>
  <line x1="90" y1="219" x2="366" y2="219" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <line x1="366" y1="219" x2="366" y2="400" stroke="#be123c" stroke-dasharray="3,3" stroke-width="1.2"/>
  <text x="68" y="223" font-size="11" font-weight="700" fill="#be123c">We2</text>
  <text x="366" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">Le2</text>

  <text x="310" y="455" text-anchor="middle" font-size="11" fill="#334155">Labour demand is DERIVED: more tourism → more MRPL → D_L shifts right → wage ↑ (We1→We2) and employment ↑ (Le1→Le2).</text>
</svg>
